<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM Assistant</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/static/marked.min.js"></script>
  <style>
    :root {
      --bg-base: #121212;
      --bg-sidebar: #000000;
      --bg-card: #181818;
      --bg-card-hover: #282828;
      --accent: #1DB954;
      --accent-dim: #158a3e;
      --text-primary: #FFFFFF;
      --text-secondary: #B3B3B3;
      --text-dim: #535353;
      --status-running: #1DB954;
      --status-review: #F59B23;
      --status-error: #E91429;
      --status-done: #1DB954;
      --status-idle: #535353;
      --border: #282828;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    #root { height: 100vh; display: flex; flex-direction: column; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 3px; }

    /* Shimmer animation */
    @keyframes shimmer {
      0% { background-position: -468px 0; }
      100% { background-position: 468px 0; }
    }
    .shimmer {
      background: linear-gradient(to right, var(--bg-card) 8%, var(--bg-card-hover) 18%, var(--bg-card) 33%);
      background-size: 800px 104px;
      animation: shimmer 1.5s infinite linear;
      border-radius: 8px;
      height: 120px;
    }

    /* Pulse animation for running dot */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .pulse { animation: pulse 1.5s infinite; }

    /* Blink cursor */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor::after {
      content: '▋';
      animation: blink 1s infinite;
      color: var(--accent);
    }

    /* Chat expand */
    @keyframes slideUp {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .slide-up { animation: slideUp 0.2s ease; }

    /* Toast */
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(10px); }
      15% { opacity: 1; transform: translateY(0); }
      85% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(10px); }
    }
    .toast { animation: fadeInOut 3s forwards; }
    .toast-error { animation: fadeInOut 5s forwards; }

    /* Markdown body rendering */
    .md-body { line-height: 1.7; font-size: 0.9rem; color: var(--text-secondary); }
    .md-body h1 { color: var(--text-primary); font-size: 1.2rem; font-weight: 700; margin: 20px 0 10px; }
    .md-body h2 { color: var(--text-primary); font-size: 1rem; font-weight: 600; margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
    .md-body h3 { color: var(--text-secondary); font-size: 0.9rem; font-weight: 600; margin: 14px 0 6px; }
    .md-body h4 { color: var(--text-secondary); font-size: 0.85rem; font-weight: 600; margin: 10px 0 4px; }
    .md-body p { margin: 8px 0; }
    .md-body ul, .md-body ol { margin: 8px 0 8px 20px; }
    .md-body li { margin: 4px 0; }
    .md-body strong { color: var(--text-primary); font-weight: 600; }
    .md-body em { font-style: italic; }
    .md-body code { background: #2a2a2a; color: #e0e0e0; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.82rem; }
    .md-body pre { background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin: 10px 0; }
    .md-body pre code { background: none; padding: 0; font-size: 0.82rem; }
    .md-body blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-dim); margin: 10px 0; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 0.85rem; }
    .md-body th { background: var(--bg-card-hover); color: var(--text-primary); font-weight: 600; padding: 8px 12px; text-align: left; border: 1px solid var(--border); }
    .md-body td { padding: 7px 12px; border: 1px solid var(--border); vertical-align: top; }
    .md-body tr:nth-child(even) { background: #1a1a1a; }
    .md-body a { color: var(--accent); text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .md-body img { max-width: 100%; border-radius: 6px; margin: 8px 0; }

    /* Spinner for running processes */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 10px; height: 10px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Utilities ────────────────────────────────────────────────────────────────

function formatTime(isoString) {
  if (!isoString) return '—';
  const d = new Date(isoString);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(isoString) {
  if (!isoString) return '—';
  const d = new Date(isoString);
  return d.toLocaleDateString([], { day: 'numeric', month: 'short', year: 'numeric' });
}

function elapsed(startedAt) {
  if (!startedAt) return '';
  const secs = Math.floor((Date.now() - new Date(startedAt)) / 1000);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function statusColor(status) {
  const map = {
    running: 'var(--status-running)',
    needs_review: 'var(--status-review)',
    error: 'var(--status-error)',
    done: 'var(--status-done)',
    idle: 'var(--status-idle)',
    cancelled: 'var(--text-dim)',
  };
  return map[status] || 'var(--text-dim)';
}

// Markdown renderer using marked.js (loaded via CDN)
function renderMarkdown(text) {
  if (!text) return '';
  if (typeof marked === 'undefined') {
    // Fallback if CDN hasn't loaded yet
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br/>');
  }
  return marked.parse(text, { breaks: true, gfm: true });
}

// Markdown render component — applies md-body class for consistent styling
function MarkdownBody({ content, style }) {
  return (
    <div
      className="md-body"
      style={style}
      dangerouslySetInnerHTML={{ __html: renderMarkdown(content || '') }}
    />
  );
}

// ─── API Layer ────────────────────────────────────────────────────────────────

const API = {
  async get(path) {
    const r = await fetch(path);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  },
  async put(path, body) {
    const r = await fetch(path, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  },
  async delete(path) {
    const r = await fetch(path, { method: 'DELETE' });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  },
};

// ─── Toast Manager ────────────────────────────────────────────────────────────

function ToastContainer({ toasts }) {
  return (
    <div style={{
      position: 'fixed', bottom: 100, right: 20,
      display: 'flex', flexDirection: 'column', gap: 8, zIndex: 9999
    }}>
      {toasts.map(t => (
        <div key={t.id}
          className={t.type === 'error' ? 'toast-error' : 'toast'}
          style={{
            background: t.type === 'error' ? 'var(--status-error)'
              : t.type === 'success' ? 'var(--accent)' : 'var(--bg-card-hover)',
            color: '#fff',
            padding: '10px 16px',
            borderRadius: 8,
            fontSize: '0.85rem',
            maxWidth: 320,
            boxShadow: '0 4px 12px rgba(0,0,0,0.5)',
          }}
        >{t.message}</div>
      ))}
    </div>
  );
}

// ─── Top Bar ──────────────────────────────────────────────────────────────────

function TopBar({ processes }) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(id);
  }, []);

  const running = processes.filter(p => p.status === 'running');
  const today = new Date().toLocaleDateString([], { weekday: 'long', day: 'numeric', month: 'long' });

  return (
    <div style={{
      height: 60, background: 'var(--bg-sidebar)',
      borderBottom: '1px solid var(--border)',
      display: 'flex', alignItems: 'center',
      padding: '0 24px', flexShrink: 0,
    }}>
      <span style={{ color: 'var(--accent)', fontWeight: 700, fontSize: '1.1rem', minWidth: 140 }}>
        PM Assistant
      </span>
      <div style={{ flex: 1, display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
        {running.map(p => (
          <div key={p.id} style={{
            display: 'flex', alignItems: 'center', gap: 6,
            background: 'var(--bg-card)', borderRadius: 20,
            padding: '4px 12px', fontSize: '0.8rem',
          }}>
            <span className="pulse" style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--accent)', display: 'inline-block' }} />
            <span style={{ color: 'var(--text-secondary)' }}>{p.name}</span>
            <span style={{ color: 'var(--text-dim)', fontVariantNumeric: 'tabular-nums' }}>
              {elapsed(p.started_at)}
            </span>
          </div>
        ))}
      </div>
      <span style={{ color: 'var(--text-secondary)', fontSize: '0.85rem', minWidth: 180, textAlign: 'right' }}>
        {today}
      </span>
    </div>
  );
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────

const NAV_ITEMS = [
  { id: 'report', label: 'Daily Report', icon: '◈' },
  { id: 'icm', label: 'ICM Pipeline', icon: '◎' },
  { id: 'agents', label: 'Agents', icon: '◉' },
  { id: 'settings', label: 'Settings', icon: '◇' },
];

function Sidebar({ activeView, setView, ollamaStatus, claudeStatus, linearStatus, wsConnected }) {
  return (
    <div style={{
      width: 240, background: 'var(--bg-sidebar)',
      borderRight: '1px solid var(--border)',
      display: 'flex', flexDirection: 'column',
      padding: '16px 0', flexShrink: 0,
    }}>
      <nav style={{ flex: 1, padding: '0 12px' }}>
        {NAV_ITEMS.map(item => {
          const active = activeView === item.id;
          return (
            <button key={item.id}
              onClick={() => setView(item.id)}
              style={{
                width: '100%', display: 'flex', alignItems: 'center', gap: 10,
                padding: '10px 12px', borderRadius: 6, border: 'none', cursor: 'pointer',
                background: active ? 'var(--accent)' : 'transparent',
                color: active ? '#fff' : 'var(--text-secondary)',
                fontSize: '0.9rem', fontWeight: active ? 600 : 400,
                marginBottom: 2, transition: 'background 0.15s',
              }}
              onMouseEnter={e => { if (!active) e.currentTarget.style.background = 'var(--bg-card)'; }}
              onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}
            >
              <span style={{ fontSize: '1rem' }}>{item.icon}</span>
              {item.label}
            </button>
          );
        })}
      </nav>
      <div style={{ padding: '12px 24px', borderTop: '1px solid var(--border)' }}>
        {!wsConnected && (
          <div style={{ color: 'var(--status-review)', fontSize: '0.75rem', marginBottom: 8 }}>
            ⚠ reconnecting...
          </div>
        )}
        <StatusDot label="Ollama" status={ollamaStatus === 'connected'} />
        <StatusDot label="Claude" status={claudeStatus === 'configured'} />
        <StatusDot label="Linear" status={linearStatus === 'configured'} />
      </div>
    </div>
  );
}

function StatusDot({ label, status }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
      <span style={{
        width: 8, height: 8, borderRadius: '50%', display: 'inline-block',
        background: status ? 'var(--accent)' : 'var(--status-error)',
      }} />
      <span style={{ color: 'var(--text-secondary)', fontSize: '0.8rem' }}>{label}</span>
    </div>
  );
}

// ─── Daily Report View ────────────────────────────────────────────────────────

function ReportView({ report, loading, onRunReport, onSendToDiscovery, linearStatus, onNavigate }) {
  const [sent, setSent] = useState(false);
  const [sending, setSending] = useState(false);
  const [historyOpen, setHistoryOpen] = useState(false);
  const [historyList, setHistoryList] = useState(null);
  const [historyLoading, setHistoryLoading] = useState(false);
  const [viewingReport, setViewingReport] = useState(null); // { id, content, created_at }
  const [viewingLoading, setViewingLoading] = useState(false);

  // Reset sent state when a new report is loaded
  useEffect(() => { setSent(false); }, [report?.id]);

  const loadHistory = async () => {
    if (historyList !== null) return; // already loaded
    setHistoryLoading(true);
    try {
      const data = await API.get('/api/reports/history?type=daily_report&limit=20');
      setHistoryList(data.reports || []);
    } catch {
      setHistoryList([]);
    } finally {
      setHistoryLoading(false);
    }
  };

  const toggleHistory = () => {
    const next = !historyOpen;
    setHistoryOpen(next);
    if (next) loadHistory();
  };

  const loadHistoricReport = async (id) => {
    setViewingLoading(true);
    setViewingReport(null);
    try {
      const data = await API.get(`/api/reports/${id}`);
      setViewingReport(data.report);
    } catch {
      setViewingReport(null);
    } finally {
      setViewingLoading(false);
    }
  };

  const handleSend = async () => {
    setSending(true);
    try {
      await onSendToDiscovery();
      setSent(true);
    } finally {
      setSending(false);
    }
  };

  if (loading) {
    return (
      <div style={{ padding: 24 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
          <h1 style={{ fontSize: '1.5rem', fontWeight: 700 }}>Daily Brief</h1>
        </div>
        <div className="shimmer" style={{ marginBottom: 16 }} />
        <div className="shimmer" style={{ marginBottom: 16 }} />
        <div className="shimmer" />
      </div>
    );
  }

  const linearMissing = linearStatus && linearStatus !== 'configured';

  if (!report) {
    return (
      <div style={{ padding: 24, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%' }}>
        <div style={{ fontSize: '3rem', marginBottom: 16 }}>◈</div>
        <h2 style={{ color: 'var(--text-secondary)', marginBottom: 8 }}>No report yet</h2>
        <p style={{ color: 'var(--text-dim)', marginBottom: 24, textAlign: 'center', maxWidth: 360 }}>
          {linearMissing
            ? 'A Linear API key is required to generate your daily brief.'
            : "Click 'Run Report' to fetch your Linear status and generate today's brief."}
        </p>
        {linearMissing ? (
          <button onClick={() => onNavigate && onNavigate('settings')} style={{ ...accentBtn, background: 'var(--status-error)' }}>
            Configure Linear →
          </button>
        ) : (
          <button onClick={onRunReport} style={accentBtn}>Run Report</button>
        )}
      </div>
    );
  }

  const generatedAt = report.content?.generated_at;

  // Determine what to render: live report or a historic one
  const displayReport = viewingReport || report;
  const displayContent = displayReport?.content || {};
  const displayMarkdown = displayContent.report_markdown || '';
  const displayGeneratedAt = displayContent.generated_at || displayReport?.created_at;

  const displaySections = [];
  const sectionTitles2 = ['Today\'s Priorities', 'Blocked Items', 'Momentum', 'Recommended Actions'];
  let remaining2 = displayMarkdown;
  sectionTitles2.forEach(title => {
    const idx = remaining2.indexOf(`## ${title}`);
    if (idx !== -1) {
      const end = remaining2.indexOf('\n## ', idx + 1);
      const sectionContent = end !== -1 ? remaining2.slice(idx, end) : remaining2.slice(idx);
      displaySections.push({ title, content: sectionContent });
      if (end !== -1) remaining2 = remaining2.slice(end);
    }
  });
  if (displaySections.length === 0 && displayMarkdown) {
    displaySections.push({ title: 'Report', content: displayMarkdown });
  }

  // Run button label/state
  const runBtnLabel = linearMissing
    ? 'Configure Linear →'
    : loading
      ? 'Fetching Linear data…'
      : report
        ? `Refresh Report · ${formatTime(generatedAt || new Date().toISOString())}`
        : 'Run Report';
  const runBtnDisabled = loading || linearMissing;

  return (
    <div style={{ padding: 24, overflowY: 'auto', height: '100%' }}>
      {/* Header row */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8, gap: 12 }}>
        <h1 style={{ fontSize: '1.5rem', fontWeight: 700 }}>Daily Brief</h1>
        <div style={{ display: 'flex', gap: 8, flexShrink: 0, alignItems: 'center' }}>
          {!viewingReport && (
            <button
              onClick={handleSend}
              disabled={sending || sent}
              style={{
                ...accentBtn,
                background: sent ? 'var(--accent-dim)' : 'var(--bg-card-hover)',
                color: sent ? '#fff' : 'var(--text-secondary)',
                opacity: sending ? 0.6 : 1,
                cursor: sending || sent ? 'default' : 'pointer',
              }}
            >
              {sent ? 'Sent to Discovery ✓' : sending ? 'Sending…' : 'Send to Discovery →'}
            </button>
          )}
          <button
            onClick={linearMissing ? () => onNavigate && onNavigate('settings') : onRunReport}
            disabled={runBtnDisabled}
            style={{
              ...accentBtn,
              background: linearMissing ? 'var(--status-error)' : loading ? 'var(--bg-card-hover)' : undefined,
              color: loading ? 'var(--text-dim)' : undefined,
              opacity: loading ? 0.7 : 1,
              cursor: runBtnDisabled ? 'not-allowed' : 'pointer',
              display: 'flex', alignItems: 'center', gap: 6,
            }}
          >
            {loading && <span className="spinner" style={{ width: 12, height: 12, borderWidth: 2 }} />}
            {runBtnLabel}
          </button>
        </div>
      </div>
      {displayGeneratedAt && !viewingReport && (
        <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem', marginBottom: 16 }}>
          Last updated: {formatDate(displayGeneratedAt)} {formatTime(displayGeneratedAt)}
        </p>
      )}

      {/* Historic report view mode */}
      {viewingReport && (
        <div style={{ marginBottom: 16, display: 'flex', alignItems: 'center', gap: 12 }}>
          <button
            onClick={() => setViewingReport(null)}
            style={{ ...accentBtn, background: 'var(--bg-card-hover)', color: 'var(--text-secondary)', padding: '4px 12px', fontSize: '0.8rem' }}
          >
            ← Back to latest
          </button>
          <span style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>
            Viewing report from {formatDate(viewingReport.created_at)} {formatTime(viewingReport.created_at)}
          </span>
        </div>
      )}

      {viewingLoading ? (
        <div>
          <div className="shimmer" style={{ marginBottom: 16 }} />
          <div className="shimmer" style={{ marginBottom: 16 }} />
          <div className="shimmer" />
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          {displaySections.map((s, i) => (
            <div key={i} style={{
              background: 'var(--bg-card)', borderRadius: 12,
              padding: 20, border: '1px solid var(--border)',
            }}>
              <MarkdownBody content={s.content} />
            </div>
          ))}
        </div>
      )}

      {/* Previous Reports */}
      {!viewingReport && (
        <div style={{ marginTop: 32, borderTop: '1px solid var(--border)', paddingTop: 16 }}>
          <button
            onClick={toggleHistory}
            style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-dim)',
              fontSize: '0.85rem', display: 'flex', alignItems: 'center', gap: 6, padding: 0 }}
          >
            <span>{historyOpen ? '▼' : '▶'}</span>
            Previous Reports
          </button>
          {historyOpen && (
            <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 4 }}>
              {historyLoading ? (
                <span style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>Loading…</span>
              ) : historyList && historyList.length <= 1 ? (
                <span style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>No previous reports.</span>
              ) : (
                (historyList || []).filter(r => r.id !== report?.id).map(r => (
                  <button key={r.id}
                    onClick={() => loadHistoricReport(r.id)}
                    style={{
                      background: 'none', border: 'none', textAlign: 'left', cursor: 'pointer',
                      padding: '6px 10px', borderRadius: 6, fontSize: '0.83rem',
                      color: 'var(--text-secondary)',
                    }}
                    onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-card-hover)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'none'}
                  >
                    {formatDate(r.created_at)} {formatTime(r.created_at)}
                  </button>
                ))
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── File Modal ───────────────────────────────────────────────────────────────

const IMAGE_EXTENSIONS = new Set(['.jpg', '.jpeg', '.png', '.gif', '.webp', '.svg']);

function isImageFile(name) {
  if (!name) return false;
  const ext = name.slice(name.lastIndexOf('.')).toLowerCase();
  return IMAGE_EXTENSIONS.has(ext);
}

function downloadFile(name, content) {
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();
  URL.revokeObjectURL(url);
}

function FileModal({ file, onClose, addToast }) {
  const [editMode, setEditMode] = useState(false);
  const [editContent, setEditContent] = useState('');
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    setEditMode(false);
    setEditContent(file?.content || '');
  }, [file?.path]);

  if (!file) return null;

  const isImage = isImageFile(file.name);
  const isUnsaved = editMode && editContent !== (file.content || '');

  const handleSave = async () => {
    setSaving(true);
    try {
      await API.put('/api/workspace/file', { path: file.path, content: editContent });
      file.content = editContent;
      addToast('File saved', 'success');
      setEditMode(false);
    } catch (err) {
      addToast(`Save failed: ${err.message}`, 'error');
    } finally {
      setSaving(false);
    }
  };

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }}
      onClick={onClose}>
      <div style={{ background: 'var(--bg-card)', borderRadius: 12, padding: 24,
        maxWidth: 860, maxHeight: '88vh', width: '94%', display: 'flex',
        flexDirection: 'column', gap: 16 }}
        onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 }}>
            <h3 style={{ fontFamily: 'monospace', fontSize: '0.95rem', color: 'var(--text-secondary)',
              overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
              {file.name}
            </h3>
            {isUnsaved && (
              <span style={{ fontSize: '0.72rem', padding: '2px 8px', borderRadius: 10,
                background: '#F59B2333', color: 'var(--status-review)', flexShrink: 0 }}>
                Unsaved
              </span>
            )}
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexShrink: 0 }}>
            {/* Download — only for text files with loaded content */}
            {!isImage && !file.loading && file.content != null && (
              <button
                onClick={() => downloadFile(file.name, file.content)}
                style={{ ...accentBtn, background: 'var(--bg-card-hover)', padding: '5px 12px', fontSize: '0.8rem' }}
                title="Download file">
                Download
              </button>
            )}
            {file.editable && !editMode && !file.loading && !isImage && (
              <button onClick={() => { setEditContent(file.content || ''); setEditMode(true); }}
                style={{ ...accentBtn, background: 'var(--bg-card-hover)', padding: '5px 12px', fontSize: '0.8rem' }}>
                Edit
              </button>
            )}
            {editMode && (
              <>
                <span style={{ color: 'var(--text-dim)', fontSize: '0.75rem', fontVariantNumeric: 'tabular-nums' }}>
                  {editContent.length.toLocaleString()} chars
                </span>
                <button onClick={() => setEditMode(false)}
                  style={{ ...accentBtn, background: 'var(--text-dim)', padding: '5px 12px', fontSize: '0.8rem' }}>
                  Cancel
                </button>
                <button onClick={handleSave} disabled={saving}
                  style={{ ...accentBtn, padding: '5px 12px', fontSize: '0.8rem',
                    background: saving ? 'var(--text-dim)' : 'var(--accent)' }}>
                  {saving ? 'Saving…' : 'Save'}
                </button>
              </>
            )}
            <button onClick={onClose}
              style={{ background: 'none', border: 'none', color: 'var(--text-secondary)',
                cursor: 'pointer', fontSize: '1.2rem', lineHeight: 1 }}>✕</button>
          </div>
        </div>

        {/* Body */}
        <div style={{ overflowY: 'auto', flex: 1, minHeight: 200 }}>
          {file.loading ? (
            <div className="shimmer" style={{ height: 200 }} />
          ) : isImage ? (
            <div style={{ textAlign: 'center' }}>
              <img
                src={`/api/workspace/file-raw?path=${encodeURIComponent(file.path)}`}
                alt={file.name}
                style={{ maxWidth: '100%', maxHeight: '70vh', borderRadius: 8, objectFit: 'contain' }}
                onError={e => { e.target.style.display = 'none'; }}
              />
            </div>
          ) : editMode ? (
            <textarea value={editContent} onChange={e => setEditContent(e.target.value)}
              style={{ width: '100%', minHeight: 420, background: 'var(--bg-base)',
                color: 'var(--text-primary)', border: '1px solid var(--border)',
                borderRadius: 8, padding: 16, fontFamily: 'monospace', fontSize: '0.85rem',
                lineHeight: 1.6, resize: 'vertical', outline: 'none' }} />
          ) : (
            <MarkdownBody content={file.content || ''} />
          )}
        </div>
      </div>
    </div>
  );
}

// ─── ICM Pipeline View ────────────────────────────────────────────────────────

function ICMView({ stages, tokenStreams, processes, onRunStage, onRetryStage, onMarkDone, addToast, onRefreshStages }) {
  const [expanded, setExpanded] = useState(null);
  const [previewFile, setPreviewFile] = useState(null);
  const loadStages = onRefreshStages;

  const toggleExpand = (stageNum) => {
    setExpanded(prev => prev === stageNum ? null : stageNum);
  };

  const openFile = async (filePath, fileName, editable) => {
    setPreviewFile({ name: fileName, path: filePath, content: null, editable, loading: true });
    try {
      const data = await API.get(`/api/workspace/file?path=${encodeURIComponent(filePath)}`);
      setPreviewFile({ name: fileName, path: filePath, content: data.content, editable, loading: false });
    } catch (err) {
      addToast(`Could not open file: ${err.message}`, 'error');
      setPreviewFile(null);
    }
  };

  const promoteFile = async (filePath, fileName) => {
    try {
      await API.post('/api/workspace/promote', { path: filePath });
      addToast(`${fileName} promoted to trusted`, 'success');
      // Re-fetch intake file list by briefly collapsing then re-expanding
      setExpanded(null);
      setTimeout(() => setExpanded(1), 50);
    } catch (err) {
      addToast(`Promote failed: ${err.message}`, 'error');
    }
  };

  const allIdle = stages.length > 0 && stages.every(s =>
    s.status === 'idle' && (s.output_file_count || 0) === 0
  );

  return (
    <div style={{ padding: 24, overflowY: 'auto', height: '100%' }}>
      <h1 style={{ fontSize: '1.5rem', fontWeight: 700, marginBottom: allIdle ? 12 : 24 }}>ICM Pipeline</h1>

      {allIdle && (
        <div style={{
          background: 'var(--bg-card)', borderRadius: 10, padding: '14px 20px',
          border: '1px solid var(--border)', marginBottom: 20,
          display: 'flex', alignItems: 'center', gap: 12,
          color: 'var(--text-secondary)', fontSize: '0.875rem',
        }}>
          <span style={{ fontSize: '1.2rem' }}>◈</span>
          <span>
            Start by running the <strong style={{ color: 'var(--text-primary)' }}>Daily Report</strong>, then use <strong style={{ color: 'var(--text-primary)' }}>Send to Discovery →</strong> to feed it into Stage 2.
          </span>
        </div>
      )}

      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {stages.map(stage => (
          <StageCard
            key={stage.stage_number}
            stage={stage}
            expanded={expanded === stage.stage_number}
            onToggle={() => toggleExpand(stage.stage_number)}
            tokenStream={tokenStreams[stage.stage_name] || ''}
            processes={processes}
            onRunStage={onRunStage}
            onRetryStage={onRetryStage}
            onMarkDone={onMarkDone}
            onOpenFile={openFile}
            onPromote={promoteFile}
            addToast={addToast}
            onRefreshStages={loadStages}
          />
        ))}
      </div>
      <FileModal file={previewFile} onClose={() => setPreviewFile(null)} addToast={addToast} />
    </div>
  );
}

// ─── Intake Promote Panel (stage 1 → stage 2) ─────────────────────────────────

function IntakePromotePanel({ onDone, addToast }) {
  const [files, setFiles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [fileState, setFileState] = useState({});
  const [promoting, setPromoting] = useState(false);
  const [done, setDone] = useState(false);

  useEffect(() => {
    const fetch_ = async () => {
      setLoading(true);
      try {
        const data = await API.get('/api/icm/1/output-files');
        setFiles(data.files || []);
        const init = {};
        (data.files || []).forEach(f => { init[f.name] = false; });
        setFileState(init);
      } catch { setFiles([]); } finally { setLoading(false); }
    };
    fetch_();
  }, []);

  const toggle = (name) => setFileState(prev => ({ ...prev, [name]: !prev[name] }));
  const selected = Object.keys(fileState).filter(n => fileState[n]);
  const canPromote = selected.length > 0 && !promoting;
  const formatBytes = (b) => b < 1024 ? `${b}B` : b < 1048576 ? `${(b/1024).toFixed(1)}KB` : `${(b/1048576).toFixed(1)}MB`;

  const handlePromote = async () => {
    setPromoting(true);
    try {
      await API.post('/api/icm/promote/1', { selected_files: selected, source: 'previous_stage' });
      setDone(true);
      addToast(`${selected.length} file(s) sent to Discovery input`, 'success');
      setTimeout(() => onDone(), 2000);
    } catch (err) {
      addToast(`Failed: ${err.message}`, 'error');
      setPromoting(false);
    }
  };

  if (done) {
    return (
      <div style={{ background: '#1a1a1a', borderTop: '1px solid var(--border)', padding: '16px 20px' }}>
        <span style={{ color: 'var(--accent)', fontSize: '0.9rem' }}>✓ Files sent to Discovery input</span>
      </div>
    );
  }

  return (
    <div style={{ background: '#1a1a1a', borderTop: '1px solid var(--border)' }}>
      <div style={{ padding: '14px 20px 0' }}>
        <h4 style={{ color: 'var(--text-secondary)', fontSize: '0.8rem',
          textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 10 }}>
          Send to Discovery — select trusted files
        </h4>
        {loading ? (
          <div style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>Loading…</div>
        ) : files.length === 0 ? (
          <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>No trusted files yet.</p>
        ) : files.map(f => (
          <label key={f.name}
            style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '7px 8px',
              borderRadius: 6, cursor: 'pointer', marginBottom: 2,
              background: fileState[f.name] ? '#1DB95411' : 'transparent', transition: 'background 0.1s' }}
            onMouseEnter={e => { if (!fileState[f.name]) e.currentTarget.style.background = 'var(--bg-card-hover)'; }}
            onMouseLeave={e => { if (!fileState[f.name]) e.currentTarget.style.background = 'transparent'; }}
          >
            <input type="checkbox" checked={!!fileState[f.name]} onChange={() => toggle(f.name)}
              style={{ accentColor: 'var(--accent)', flexShrink: 0 }} />
            <span style={{ flex: 1, fontFamily: 'monospace', fontSize: '0.82rem', color: 'var(--text-primary)',
              overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{f.name}</span>
            {f.size_bytes != null && (
              <span style={{ fontSize: '0.72rem', color: 'var(--text-dim)', flexShrink: 0 }}>{formatBytes(f.size_bytes)}</span>
            )}
            {f.modified_at && (
              <span style={{ fontSize: '0.72rem', color: 'var(--text-dim)', flexShrink: 0 }}>{formatTime(f.modified_at)}</span>
            )}
          </label>
        ))}
      </div>
      <div style={{ padding: '12px 20px 16px', display: 'flex',
        justifyContent: 'space-between', alignItems: 'center', gap: 12 }}>
        <span style={{ color: 'var(--text-dim)', fontSize: '0.82rem' }}>
          {selected.length > 0 ? `${selected.length} file(s) → Discovery input` : 'Select files to send to Discovery'}
        </span>
        <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
          <button onClick={onDone}
            style={{ ...accentBtn, background: 'var(--text-dim)', padding: '6px 14px', fontSize: '0.8rem' }}>
            Cancel
          </button>
          <button onClick={handlePromote} disabled={!canPromote}
            style={{ ...accentBtn, padding: '6px 14px', fontSize: '0.8rem',
              background: canPromote ? 'var(--accent)' : 'var(--text-dim)',
              cursor: canPromote ? 'pointer' : 'not-allowed' }}>
            {promoting ? 'Sending…' : 'Send to Discovery →'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Input Management Panel ────────────────────────────────────────────────────

function InputManagementPanel({ stage, onDone, addToast }) {
  const stageNum = stage.stage_number;
  const nextStage = stageNum + 1;
  const nextNames = { 3: 'opportunity', 4: 'prd', 5: 'critique', 6: 'stories' };
  const nextName = nextNames[nextStage] || '';

  // activeTab: 'previous' | 'intake' | 'queued' | 'upload'
  const [activeTab, setActiveTab] = useState('previous');
  const [sources, setSources] = useState(null);
  const [loading, setLoading] = useState(true);
  // Map of filename → { checked, source, uploaded, uploading, error }
  // source: 'previous_stage' | 'intake_trusted'
  const [fileState, setFileState] = useState({});
  const [adding, setAdding] = useState(false);
  const [done, setDone] = useState(false);
  const dropRef = useRef(null);
  const inputRef = useRef(null);

  const fetchSources = async (precheck = false) => {
    setLoading(true);
    try {
      const data = await API.get(`/api/icm/${stageNum}/input-sources`);
      setSources(data);
      // On first load, pre-check all files from the primary source (previous stage / intake)
      if (precheck) {
        const initial = {};
        (data.previous_stage?.files || []).forEach(f => {
          initial[f.name] = { checked: true, source: 'previous_stage' };
        });
        setFileState(initial);
      }
    } catch {
      setSources(null);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { fetchSources(true); }, [stageNum]);

  const toggleFile = (name, source) => {
    setFileState(prev => {
      const cur = prev[name];
      if (cur?.checked) {
        const next = { ...prev };
        delete next[name];
        return next;
      }
      return { ...prev, [name]: { checked: true, source } };
    });
  };

  const uploadFile = async (file) => {
    const name = file.name;
    const ext = name.split('.').pop().toLowerCase();
    if (!['md', 'txt', 'jpg', 'jpeg', 'png'].includes(ext)) {
      addToast(`Only .md, .txt, .jpeg, .jpg, .png files accepted`, 'error');
      return;
    }
    setFileState(prev => ({ ...prev, [name]: { checked: false, source: null, uploading: true, error: null } }));
    try {
      const form = new FormData();
      form.append('file', file);
      const r = await fetch(`/api/icm/${stageNum}/upload`, { method: 'POST', body: form });
      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: r.statusText }));
        throw new Error(err.detail || r.statusText);
      }
      const data = await r.json();
      const savedName = data.saved_as;
      setFileState(prev => {
        const next = { ...prev };
        delete next[name];
        next[savedName] = { checked: true, source: 'uploaded', uploaded: true, uploading: false, error: null };
        return next;
      });
      // Refresh sources so "Already queued" tab picks up the new file (no precheck — preserve user selections)
      fetchSources(false);
    } catch (err) {
      setFileState(prev => ({ ...prev, [name]: { checked: false, source: null, uploading: false, error: err.message } }));
    }
  };

  const handleFiles = (files) => { Array.from(files).forEach(uploadFile); };
  const handleDrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };

  const formatBytes = (b) => b < 1024 ? `${b}B` : b < 1048576 ? `${(b/1024).toFixed(1)}KB` : `${(b/1048576).toFixed(1)}MB`;

  // Selected files that came from a promotable source (not uploaded, not uploading)
  const promotable = Object.entries(fileState).filter(([, s]) => s.checked && s.source && s.source !== 'uploaded' && !s.uploading);
  const canAdd = promotable.length > 0 && !adding;

  const handleAdd = async () => {
    setAdding(true);
    // Group by source
    const bySource = {};
    promotable.forEach(([name, s]) => {
      const src = s.source;
      if (!bySource[src]) bySource[src] = [];
      bySource[src].push(name);
    });
    try {
      for (const [source, files] of Object.entries(bySource)) {
        await API.post(`/api/icm/promote/${stageNum}`, { selected_files: files, source });
      }
      setDone(true);
      addToast(`${promotable.length} file(s) added to Stage ${nextStage} input`, 'success');
      setTimeout(() => onDone(), 2000);
    } catch (err) {
      addToast(`Failed: ${err.message}`, 'error');
      setAdding(false);
    }
  };

  const selectedCount = Object.values(fileState).filter(s => s.checked && !s.uploading).length;

  // Tab config — hide "Intake / Trusted" tab for stage 2 since it's same as "Previous Stage"
  const showIntakeTab = stageNum !== 2;

  const tabStyle = (tab) => ({
    padding: '6px 14px', fontSize: '0.78rem', border: 'none', borderRadius: 6, cursor: 'pointer',
    fontWeight: activeTab === tab ? 600 : 400,
    background: activeTab === tab ? 'var(--accent)' : 'var(--bg-card-hover)',
    color: activeTab === tab ? '#000' : 'var(--text-secondary)',
  });

  const renderFileRow = (f, source, readonly = false) => {
    const state = fileState[f.name] || {};
    const isChecked = !!state.checked;
    return (
      <label key={f.name}
        style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '7px 8px',
          borderRadius: 6, cursor: readonly ? 'default' : 'pointer', marginBottom: 2,
          background: isChecked ? '#1DB95411' : 'transparent', transition: 'background 0.1s' }}
        onMouseEnter={e => { if (!readonly && !isChecked) e.currentTarget.style.background = 'var(--bg-card-hover)'; }}
        onMouseLeave={e => { if (!readonly && !isChecked) e.currentTarget.style.background = 'transparent'; }}
      >
        {!readonly && (
          <input type="checkbox" checked={isChecked} onChange={() => toggleFile(f.name, source)}
            style={{ accentColor: 'var(--accent)', flexShrink: 0 }} />
        )}
        {readonly && <span style={{ width: 14, flexShrink: 0 }} />}
        <span style={{ flex: 1, fontFamily: 'monospace', fontSize: '0.82rem',
          color: 'var(--text-primary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
          {f.name}
        </span>
        {f.size_bytes != null && (
          <span style={{ fontSize: '0.72rem', color: 'var(--text-dim)', flexShrink: 0 }}>
            {formatBytes(f.size_bytes)}
          </span>
        )}
        {f.modified_at && (
          <span style={{ fontSize: '0.72rem', color: 'var(--text-dim)', flexShrink: 0 }}>
            {formatTime(f.modified_at)}
          </span>
        )}
      </label>
    );
  };

  if (done) {
    return (
      <div style={{ background: '#1a1a1a', borderTop: '1px solid var(--border)', padding: '16px 20px' }}>
        <span style={{ color: 'var(--accent)', fontSize: '0.9rem' }}>
          ✓ {promotable.length} file(s) added to Stage {nextStage} — {nextName} input
        </span>
      </div>
    );
  }

  return (
    <div style={{ background: '#1a1a1a', borderTop: '1px solid var(--border)' }}>
      {/* Tab bar */}
      <div style={{ padding: '14px 20px 0', display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        <button style={tabStyle('previous')} onClick={() => setActiveTab('previous')}>
          {stageNum === 2 ? 'Intake / Trusted' : `Stage ${stageNum - 1} Output`}
        </button>
        {showIntakeTab && (
          <button style={tabStyle('intake')} onClick={() => setActiveTab('intake')}>Intake / Trusted</button>
        )}
        <button style={tabStyle('queued')} onClick={() => setActiveTab('queued')}>Already Queued</button>
        <button style={tabStyle('upload')} onClick={() => setActiveTab('upload')}>Upload</button>
      </div>

      {/* Tab content */}
      <div style={{ padding: '12px 20px 0', minHeight: 80 }}>
        {loading ? (
          <div style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>Loading…</div>
        ) : !sources ? (
          <div style={{ color: 'var(--status-error)', fontSize: '0.8rem' }}>Could not load sources.</div>
        ) : activeTab === 'previous' ? (() => {
          const files = sources.previous_stage?.files || [];
          const prevName = sources.previous_stage?.stage_name || '';
          return files.length === 0 ? (
            <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>
              No files in {prevName} output yet.
            </p>
          ) : files.map(f => renderFileRow(f, 'previous_stage'));
        })() : activeTab === 'intake' ? (() => {
          const files = sources.intake_trusted?.files || [];
          return files.length === 0 ? (
            <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>
              No files in intake / trusted yet.
            </p>
          ) : files.map(f => renderFileRow(f, 'intake_trusted'));
        })() : activeTab === 'queued' ? (() => {
          const files = sources.current_input?.files || [];
          return files.length === 0 ? (
            <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>
              No files queued in this stage's input yet.
            </p>
          ) : files.map(f => renderFileRow(f, null, true));
        })() : (
          /* Upload tab */
          <div>
            <div
              ref={dropRef}
              onClick={() => inputRef.current?.click()}
              onDragOver={e => { e.preventDefault(); dropRef.current.style.borderColor = 'var(--accent)'; dropRef.current.style.background = '#1DB95408'; }}
              onDragLeave={() => { dropRef.current.style.borderColor = 'var(--text-dim)'; dropRef.current.style.background = 'transparent'; }}
              onDrop={handleDrop}
              style={{ border: '1px dashed var(--text-dim)', borderRadius: 8,
                padding: '18px 16px', textAlign: 'center', cursor: 'pointer',
                transition: 'border-color 0.15s, background 0.15s' }}
            >
              <div style={{ color: 'var(--text-secondary)', fontSize: '0.85rem', marginBottom: 4 }}>
                Drop files here or click to browse
              </div>
              <div style={{ color: 'var(--text-dim)', fontSize: '0.75rem' }}>
                Uploaded directly to Stage {stageNum} input (.md, .txt, .jpg, .jpeg, .png)
              </div>
              <input ref={inputRef} type="file" multiple accept=".md,.txt,.jpg,.jpeg,.png"
                style={{ display: 'none' }} onChange={e => { handleFiles(e.target.files); e.target.value = ''; }} />
            </div>
            {/* Uploading / errored rows */}
            {Object.entries(fileState).filter(([, s]) => s.uploading || s.error).map(([name, state]) => (
              <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 10,
                padding: '7px 8px', marginTop: 4 }}>
                {state.uploading
                  ? <span className="spinner" />
                  : <span style={{ color: 'var(--status-error)', fontSize: '0.9rem' }}>✕</span>}
                <span style={{ fontFamily: 'monospace', fontSize: '0.82rem', color: 'var(--text-dim)',
                  flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  {name}
                </span>
                {state.error && (
                  <span style={{ fontSize: '0.72rem', color: 'var(--status-error)' }}>{state.error}</span>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Confirm bar */}
      <div style={{ padding: '12px 20px 16px', display: 'flex',
        justifyContent: 'space-between', alignItems: 'center', gap: 12 }}>
        <span style={{ color: 'var(--text-dim)', fontSize: '0.82rem' }}>
          {selectedCount > 0
            ? `${selectedCount} file(s) selected → Stage ${nextStage} input`
            : `Select files to add to Stage ${nextStage} — ${nextName}`}
        </span>
        <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
          <button onClick={onDone}
            style={{ ...accentBtn, background: 'var(--text-dim)', padding: '6px 14px', fontSize: '0.8rem' }}>
            Close
          </button>
          <button onClick={handleAdd} disabled={!canAdd}
            style={{ ...accentBtn, padding: '6px 14px', fontSize: '0.8rem',
              background: canAdd ? 'var(--accent)' : 'var(--text-dim)',
              cursor: canAdd ? 'pointer' : 'not-allowed' }}>
            {adding ? 'Adding…' : 'Add Selected'}
          </button>
        </div>
      </div>
    </div>
  );
}

function StageCard({ stage, expanded, onToggle, tokenStream, processes, onRunStage, onRetryStage, onMarkDone, onOpenFile, onPromote, addToast, onRefreshStages }) {
  const tokenRef = useRef(null);
  const [inputFiles, setInputFiles] = useState([]);
  const [outputFiles, setOutputFiles] = useState([]);
  const [filesLoading, setFilesLoading] = useState(false);
  const [inputPanelOpen, setInputPanelOpen] = useState(false);

  // Find the running process for this stage to get started_at for elapsed timer
  const runningProcess = React.useMemo(() => {
    if (!processes) return null;
    return processes.find(p => p.type === `icm_stage_${stage.stage_number}` && p.status === 'running') || null;
  }, [processes, stage.stage_number]);

  // Find the last error process for inline error message display
  const errorProcess = React.useMemo(() => {
    if (!processes || stage.status !== 'error') return null;
    const stageProcs = processes.filter(p => p.type === `icm_stage_${stage.stage_number}` && p.status === 'error');
    return stageProcs.length > 0 ? stageProcs[0] : null;
  }, [processes, stage.stage_number, stage.status]);

  // 1-second tick while running so elapsed display updates live
  const [, setTick] = useState(0);
  useEffect(() => {
    if (stage.status !== 'running') return;
    const id = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(id);
  }, [stage.status]);

  useEffect(() => {
    if (tokenRef.current && tokenStream) {
      tokenRef.current.scrollTop = tokenRef.current.scrollHeight;
    }
  }, [tokenStream]);

  useEffect(() => {
    if (!expanded) return;
    const stagePath = `0${stage.stage_number}_${stage.stage_name}`;

    const fetchFiles = async () => {
      setFilesLoading(true);
      try {
        if (stage.stage_number === 1) {
          const [tData, qData] = await Promise.all([
            API.get('/api/workspace/files?dir=01_intake%2Ftrusted'),
            API.get('/api/workspace/files?dir=01_intake%2Fquarantine'),
          ]);
          // quarantine = needs review (left/input), trusted = ready for discovery (right/output)
          setInputFiles(qData.files.map(f => ({ ...f, label: f.name })));
          setOutputFiles(tData.files.map(f => ({ ...f, label: f.name })));
        } else {
          const [inData, outData] = await Promise.all([
            API.get(`/api/workspace/files?dir=${encodeURIComponent(stagePath + '/input')}`),
            API.get(`/api/workspace/files?dir=${encodeURIComponent(stagePath + '/output')}`),
          ]);
          setInputFiles(inData.files.map(f => ({ ...f, label: f.name })));
          setOutputFiles(outData.files
            .sort((a, b) => b.modified.localeCompare(a.modified))
            .slice(0, 5)
            .map(f => ({ ...f, label: f.name })));
        }
      } catch { /* non-critical */ }
      finally { setFilesLoading(false); }
    };

    fetchFiles();
  }, [expanded, stage.stage_number, stage.stage_name]);

  const statusAllowsRun = ['idle', 'done', 'error', 'needs_review'].includes(stage.status);
  const hasInputFiles = (stage.input_file_count || 0) > 0;
  const canRun = statusAllowsRun && hasInputFiles;
  const isRunning = stage.status === 'running';
  const isError = stage.status === 'error';
  const needsReview = stage.status === 'needs_review';
  const isIntake = stage.stage_number === 1;

  const runBtnLabel = isRunning
    ? `Running… ${elapsed(runningProcess?.started_at)}`
    : hasInputFiles
      ? `Run with ${stage.input_file_count} file${stage.input_file_count !== 1 ? 's' : ''}`
      : 'No Input Files';

  return (
    <div style={{
      background: 'var(--bg-card)', borderRadius: 12,
      border: `1px solid ${isRunning ? 'var(--accent)' : needsReview ? 'var(--status-review)' : 'var(--border)'}`,
      overflow: 'hidden', transition: 'border-color 0.2s',
    }}>
      {/* Card header */}
      <div
        onClick={onToggle}
        style={{
          display: 'flex', alignItems: 'center', gap: 16,
          padding: '16px 20px', cursor: 'pointer',
        }}
      >
        <div style={{
          width: 32, height: 32, borderRadius: '50%',
          background: 'var(--accent)', display: 'flex', alignItems: 'center',
          justifyContent: 'center', fontWeight: 700, fontSize: '0.85rem', flexShrink: 0,
        }}>
          {stage.stage_number}
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 600, textTransform: 'capitalize', marginBottom: 2 }}>
            {stage.stage_name}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
            {isRunning && runningProcess?.started_at ? (
              <span style={{ color: 'var(--status-running)', fontSize: '0.72rem', fontVariantNumeric: 'tabular-nums' }}>
                ● {elapsed(runningProcess.started_at)}
              </span>
            ) : stage.last_run_at ? (
              <span style={{ color: 'var(--text-dim)', fontSize: '0.72rem' }}>
                Last run: {formatDate(stage.last_run_at)} {formatTime(stage.last_run_at)}
              </span>
            ) : null}
            {stage.input_file_count > 0 && (
              <span style={{ fontSize: '0.68rem', padding: '1px 7px', borderRadius: 10,
                background: 'var(--bg-card-hover)', color: 'var(--text-dim)' }}>
                {stage.input_file_count} in
              </span>
            )}
            {stage.output_file_count > 0 && (
              <span style={{ fontSize: '0.68rem', padding: '1px 7px', borderRadius: 10,
                background: `${statusColor('done')}22`, color: 'var(--status-done)' }}>
                {stage.output_file_count} out
              </span>
            )}
          </div>
        </div>
        <div style={{
          padding: '3px 10px', borderRadius: 20, fontSize: '0.75rem', fontWeight: 600,
          background: `${statusColor(stage.status)}22`,
          color: statusColor(stage.status),
          textTransform: 'uppercase', letterSpacing: '0.5px',
        }}>
          {stage.status.replace('_', ' ')}
        </div>
        {!isIntake && (isRunning || statusAllowsRun) && (
          <button
            disabled={!canRun || isRunning}
            onClick={e => { e.stopPropagation(); onRunStage(stage.stage_number); }}
            style={{
              ...accentBtn, padding: '6px 14px', fontSize: '0.8rem',
              opacity: (!canRun || isRunning) ? 0.45 : 1,
              cursor: (!canRun || isRunning) ? 'not-allowed' : 'pointer',
              background: isRunning ? 'var(--status-running)' : !hasInputFiles ? 'var(--bg-card-hover)' : undefined,
              color: isRunning ? '#000' : !hasInputFiles ? 'var(--text-dim)' : undefined,
            }}
          >
            {runBtnLabel}
          </button>
        )}
        {!isIntake && stage.stage_number < 6 && (
          <button
            disabled={isRunning}
            onClick={e => { e.stopPropagation(); setInputPanelOpen(o => !o); }}
            style={{ ...accentBtn, background: inputPanelOpen ? 'var(--accent)' : 'var(--bg-card-hover)',
              color: inputPanelOpen ? '#000' : 'var(--text-secondary)',
              padding: '6px 14px', fontSize: '0.8rem',
              opacity: isRunning ? 0.4 : 1, cursor: isRunning ? 'not-allowed' : 'pointer' }}
          >
            {inputPanelOpen ? 'Close Inputs' : 'Manage Inputs'}
          </button>
        )}
        <span style={{ color: 'var(--text-dim)', fontSize: '0.9rem' }}>
          {expanded ? '▲' : '▼'}
        </span>
      </div>

      {/* Review banner */}
      {needsReview && (
        <div style={{
          background: '#F59B2322', borderTop: '1px solid #F59B2344',
          padding: '10px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12,
        }}>
          <span style={{ color: 'var(--status-review)', fontSize: '0.85rem' }}>
            ⚠ Output ready for review. Review before advancing.
          </span>
          <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
            <button
              onClick={() => onMarkDone(stage.stage_number)}
              style={{ ...accentBtn, background: 'var(--status-review)', padding: '6px 14px', fontSize: '0.8rem' }}
            >
              Mark as Done
            </button>
            {stage.stage_number < 6 && (
              <button
                onClick={() => setInputPanelOpen(o => !o)}
                style={{ ...accentBtn, padding: '6px 14px', fontSize: '0.8rem' }}
              >
                {inputPanelOpen ? 'Close Inputs' : `Promote to Stage ${stage.stage_number + 1} →`}
              </button>
            )}
          </div>
        </div>
      )}

      {/* Error banner — shown when stage errored, with inline error message and Retry button */}
      {!isIntake && isError && (
        <div style={{
          background: '#E9142911', borderTop: '1px solid #E9142933',
          padding: '10px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12,
        }}>
          <div>
            <span style={{ color: 'var(--status-error)', fontSize: '0.85rem', fontWeight: 600 }}>Stage errored</span>
            {errorProcess?.error_message && (
              <p style={{ color: 'var(--text-dim)', fontSize: '0.78rem', marginTop: 2, marginBottom: 0 }}>
                {errorProcess.error_message}
              </p>
            )}
          </div>
          <button
            onClick={() => onRetryStage && onRetryStage(stage.stage_number)}
            disabled={!hasInputFiles}
            style={{
              ...accentBtn, padding: '5px 14px', fontSize: '0.8rem', flexShrink: 0,
              opacity: hasInputFiles ? 1 : 0.4, cursor: hasInputFiles ? 'pointer' : 'not-allowed',
            }}
          >
            Retry
          </button>
        </div>
      )}

      {/* Ready to advance nudge — shown when stage has output and panel is closed (done or needs_review) */}
      {!isIntake && !inputPanelOpen &&
        (stage.status === 'done' || stage.status === 'needs_review') &&
        stage.output_file_count > 0 &&
        stage.stage_number < 6 && (
        <div style={{
          background: '#1DB95411', borderTop: '1px solid #1DB95433',
          padding: '8px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        }}>
          <span style={{ color: 'var(--accent)', fontSize: '0.82rem' }}>
            {stage.output_file_count} output file{stage.output_file_count !== 1 ? 's' : ''} ready to advance →
          </span>
          <button
            onClick={() => setInputPanelOpen(true)}
            style={{ ...accentBtn, padding: '4px 12px', fontSize: '0.78rem' }}
          >
            Advance to Stage {stage.stage_number + 1} →
          </button>
        </div>
      )}

      {/* Input management panel — below review banner, available for any non-intake stage (2-5) */}
      {inputPanelOpen && !isIntake && stage.stage_number < 6 && (
        <InputManagementPanel
          stage={stage}
          addToast={addToast}
          onDone={() => {
            setInputPanelOpen(false);
            onRefreshStages && onRefreshStages();
          }}
        />
      )}

      {/* Intake promote panel — "Send to Discovery" from trusted files */}
      {inputPanelOpen && isIntake && (
        <IntakePromotePanel
          addToast={addToast}
          onDone={() => {
            setInputPanelOpen(false);
            onRefreshStages && onRefreshStages();
          }}
        />
      )}

      {/* Token stream when running */}
      {isRunning && tokenStream && (
        <div
          ref={tokenRef}
          style={{
            borderTop: '1px solid var(--border)',
            padding: 16, maxHeight: 200, overflowY: 'auto',
            fontFamily: 'monospace', fontSize: '0.8rem',
            color: 'var(--text-secondary)', lineHeight: 1.6,
            background: '#0a0a0a',
          }}
        >
          <span>{tokenStream}</span>
          <span className="cursor" />
        </div>
      )}

      {/* Expanded content */}
      {expanded && (
        <div style={{ borderTop: '1px solid var(--border)', padding: 20 }}>
          {isIntake ? (
            /* ── Intake: quarantine → trusted workflow ── */
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
              {/* Left: quarantine */}
              <div>
                <h4 style={{ color: 'var(--status-review)', fontSize: '0.8rem', marginBottom: 8,
                  textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                  Quarantine — Pending Review
                </h4>
                {filesLoading ? (
                  <div style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>Loading…</div>
                ) : inputFiles.length === 0 ? (
                  <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>
                    No files pending review. Drop .md files into 01_intake/quarantine/.
                  </p>
                ) : inputFiles.map(f => (
                  <div key={f.path} style={{ display: 'flex', alignItems: 'center',
                    justifyContent: 'space-between', marginBottom: 8, gap: 8 }}>
                    <button onClick={() => onOpenFile(f.path, f.label, false)}
                      style={{ background: 'none', border: 'none', color: 'var(--accent)',
                        cursor: 'pointer', textAlign: 'left', fontFamily: 'monospace',
                        fontSize: '0.8rem', textDecoration: 'underline',
                        overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>
                      {f.label}
                    </button>
                    <button
                      onClick={() => onPromote(f.path, f.label)}
                      style={{ ...accentBtn, background: 'var(--status-review)',
                        padding: '3px 10px', fontSize: '0.75rem', flexShrink: 0 }}>
                      Promote
                    </button>
                  </div>
                ))}
              </div>

              {/* Right: trusted */}
              <div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                  <h4 style={{ color: 'var(--accent)', fontSize: '0.8rem',
                    textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                    Trusted — Ready for Discovery
                  </h4>
                  {outputFiles.length > 0 && (
                    <button
                      onClick={() => setInputPanelOpen(o => !o)}
                      style={{ ...accentBtn, padding: '3px 10px', fontSize: '0.75rem' }}>
                      {inputPanelOpen ? 'Cancel' : 'Send to Discovery →'}
                    </button>
                  )}
                </div>
                {filesLoading ? (
                  <div style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>Loading…</div>
                ) : outputFiles.length === 0 ? (
                  <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>
                    No trusted files yet. Promote files from quarantine, or run the Daily Report.
                  </p>
                ) : outputFiles.map(f => (
                  <button key={f.path} onClick={() => onOpenFile(f.path, f.label, false)}
                    style={{ display: 'block', background: 'none', border: 'none', color: 'var(--accent)',
                      cursor: 'pointer', textAlign: 'left', fontFamily: 'monospace',
                      fontSize: '0.8rem', padding: '3px 0', textDecoration: 'underline' }}>
                    {f.label}
                  </button>
                ))}
              </div>
            </div>
          ) : (
            /* ── Regular stages: input / output files ── */
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
              {/* Input Files */}
              <div>
                <h4 style={{ color: 'var(--text-secondary)', fontSize: '0.8rem', marginBottom: 8,
                  textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                  Input Files
                </h4>
                {filesLoading ? (
                  <div style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>Loading…</div>
                ) : inputFiles.length === 0 ? (
                  <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>
                    No input files — add .md files to 0{stage.stage_number}_{stage.stage_name}/input/
                  </p>
                ) : inputFiles.map(f => (
                  <button key={f.path} onClick={() => onOpenFile(f.path, f.label, false)}
                    style={{ display: 'block', background: 'none', border: 'none', color: 'var(--accent)',
                      cursor: 'pointer', textAlign: 'left', fontFamily: 'monospace',
                      fontSize: '0.8rem', padding: '3px 0', textDecoration: 'underline' }}>
                    {f.label}
                  </button>
                ))}
              </div>

              {/* Output Files */}
              <div>
                <h4 style={{ color: 'var(--text-secondary)', fontSize: '0.8rem', marginBottom: 8,
                  textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                  Output Files
                </h4>
                {filesLoading ? (
                  <div style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>Loading…</div>
                ) : outputFiles.length === 0 ? (
                  <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem' }}>No output yet</p>
                ) : outputFiles.map(f => (
                  <button key={f.path} onClick={() => onOpenFile(f.path, f.label, true)}
                    style={{ display: 'block', background: 'none', border: 'none', color: 'var(--accent)',
                      cursor: 'pointer', textAlign: 'left', fontFamily: 'monospace',
                      fontSize: '0.8rem', padding: '3px 0', textDecoration: 'underline' }}>
                    {f.label}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

const AGENT_DEFS = [
  {
    id: 'linear_report', processType: 'linear_report',
    name: 'Linear Report Agent',
    description: 'Fetches Linear project data and synthesizes a daily brief using Claude.',
  },
  {
    id: 'icm_discovery', processType: 'icm_stage_2',
    name: 'ICM Discovery Agent',
    description: 'Transforms raw user research into structured pain points (Stage 2, Ollama).',
  },
  {
    id: 'icm_opportunity', processType: 'icm_stage_3',
    name: 'ICM Opportunity Agent',
    description: 'Frames pain points as opportunity statements (Stage 3, Ollama).',
  },
  {
    id: 'icm_prd', processType: 'icm_stage_4',
    name: 'ICM PRD Agent',
    description: 'Produces a Product Requirements Document from opportunity statements (Stage 4, Claude).',
  },
  {
    id: 'icm_critique', processType: 'icm_stage_5',
    name: 'ICM Critique Agent',
    description: 'Red-teams the PRD adversarially before it goes to engineering (Stage 5, Claude).',
  },
  {
    id: 'icm_stories', processType: 'icm_stage_6',
    name: 'ICM Stories Agent',
    description: 'Converts the PRD into sprint-ready user stories with acceptance criteria (Stage 6, Ollama).',
  },
];

function AgentsView({ processes, onRunReport, focusedAgentId }) {
  const [expandedId, setExpandedId] = useState(null);
  const cardRefs = useRef({});

  // Auto-expand and scroll when a process panel click navigates here
  useEffect(() => {
    if (!focusedAgentId) return;
    setExpandedId(focusedAgentId);
    const el = cardRefs.current[focusedAgentId];
    if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
  }, [focusedAgentId]);

  return (
    <div style={{ padding: 24, overflowY: 'auto', height: '100%' }}>
      <h1 style={{ fontSize: '1.5rem', fontWeight: 700, marginBottom: 24 }}>Agents</h1>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {AGENT_DEFS.map(agent => {
          const agentRuns = processes
            .filter(p => p.type === agent.processType)
            .sort((a, b) => (b.started_at || '').localeCompare(a.started_at || ''));
          const lastRun = agentRuns[0];
          const isExpanded = expandedId === agent.id;
          const isFocused = focusedAgentId === agent.id;

          return (
            <div
              key={agent.id}
              ref={el => { cardRefs.current[agent.id] = el; }}
              style={{
                background: 'var(--bg-card)', borderRadius: 12,
                border: `1px solid ${isFocused ? 'var(--accent)' : 'var(--border)'}`,
                overflow: 'hidden', transition: 'border-color 0.2s',
              }}
            >
              {/* Header row */}
              <div
                onClick={() => setExpandedId(isExpanded ? null : agent.id)}
                style={{
                  padding: '16px 20px', cursor: 'pointer',
                  display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                }}
              >
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, marginBottom: 4 }}>{agent.name}</div>
                  <div style={{ color: 'var(--text-secondary)', fontSize: '0.85rem', marginBottom: 4 }}>
                    {agent.description}
                  </div>
                  {lastRun && (
                    <div style={{ color: 'var(--text-dim)', fontSize: '0.75rem' }}>
                      Last run: {formatDate(lastRun.started_at)} {formatTime(lastRun.started_at)} —{' '}
                      <span style={{ color: statusColor(lastRun.status) }}>{lastRun.status}</span>
                    </div>
                  )}
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
                  {lastRun && (
                    <span style={{
                      padding: '3px 10px', borderRadius: 20, fontSize: '0.75rem',
                      background: `${statusColor(lastRun.status)}22`,
                      color: statusColor(lastRun.status),
                    }}>
                      {lastRun.status === 'running' && <span className="spinner" style={{ marginRight: 5, verticalAlign: 'middle' }} />}
                      {lastRun.status.replace('_', ' ')}
                    </span>
                  )}
                  {agent.id === 'linear_report' && (
                    <button onClick={e => { e.stopPropagation(); onRunReport(); }} style={accentBtn}>Run</button>
                  )}
                  <span style={{ color: 'var(--text-dim)', fontSize: '0.9rem' }}>
                    {isExpanded ? '▲' : '▼'}
                  </span>
                </div>
              </div>

              {/* Expanded: recent runs */}
              {isExpanded && (
                <div style={{ borderTop: '1px solid var(--border)', padding: '16px 20px' }}>
                  <h4 style={{ color: 'var(--text-secondary)', fontSize: '0.8rem', marginBottom: 12,
                    textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                    Recent Runs
                  </h4>
                  {agentRuns.length === 0 ? (
                    <p style={{ color: 'var(--text-dim)', fontSize: '0.85rem' }}>No runs yet.</p>
                  ) : agentRuns.slice(0, 5).map(run => (
                    <div key={run.id} style={{
                      padding: '10px 14px', borderRadius: 8, marginBottom: 8,
                      background: 'var(--bg-base)', border: '1px solid var(--border)',
                    }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                        <span style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>
                          {formatDate(run.started_at)} {formatTime(run.started_at)}
                        </span>
                        <span style={{
                          fontSize: '0.75rem', padding: '2px 8px', borderRadius: 12,
                          background: `${statusColor(run.status)}22`, color: statusColor(run.status),
                        }}>
                          {run.status === 'running' && <span className="spinner" style={{ marginRight: 4, verticalAlign: 'middle' }} />}
                          {run.status.replace('_', ' ')}
                        </span>
                      </div>
                      {run.status === 'running' && run.started_at && (
                        <div style={{ color: 'var(--accent)', fontSize: '0.75rem' }}>
                          Running… {elapsed(run.started_at)}
                        </div>
                      )}
                      {run.output_summary && (
                        <div style={{ color: 'var(--text-dim)', fontSize: '0.78rem', marginTop: 4,
                          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '100%' }}>
                          {run.output_summary}
                        </div>
                      )}
                      {run.error_message && (
                        <div style={{ color: 'var(--status-error)', fontSize: '0.78rem', marginTop: 4 }}>
                          ✕ {run.error_message}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Settings View ────────────────────────────────────────────────────────────
