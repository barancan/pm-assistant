<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM Assistant</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg-base: #121212;
      --bg-sidebar: #000000;
      --bg-card: #181818;
      --bg-card-hover: #282828;
      --accent: #1DB954;
      --accent-dim: #158a3e;
      --text-primary: #FFFFFF;
      --text-secondary: #B3B3B3;
      --text-dim: #535353;
      --status-running: #1DB954;
      --status-review: #F59B23;
      --status-error: #E91429;
      --status-done: #1DB954;
      --status-idle: #535353;
      --border: #282828;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    #root { height: 100vh; display: flex; flex-direction: column; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 3px; }

    /* Shimmer animation */
    @keyframes shimmer {
      0% { background-position: -468px 0; }
      100% { background-position: 468px 0; }
    }
    .shimmer {
      background: linear-gradient(to right, var(--bg-card) 8%, var(--bg-card-hover) 18%, var(--bg-card) 33%);
      background-size: 800px 104px;
      animation: shimmer 1.5s infinite linear;
      border-radius: 8px;
      height: 120px;
    }

    /* Pulse animation for running dot */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .pulse { animation: pulse 1.5s infinite; }

    /* Blink cursor */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor::after {
      content: '▋';
      animation: blink 1s infinite;
      color: var(--accent);
    }

    /* Chat expand */
    @keyframes slideUp {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .slide-up { animation: slideUp 0.2s ease; }

    /* Toast */
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(10px); }
      15% { opacity: 1; transform: translateY(0); }
      85% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(10px); }
    }
    .toast { animation: fadeInOut 3s forwards; }
    .toast-error { animation: fadeInOut 5s forwards; }

    /* Spinner for running processes */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 10px; height: 10px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Utilities ────────────────────────────────────────────────────────────────

function formatTime(isoString) {
  if (!isoString) return '—';
  const d = new Date(isoString);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(isoString) {
  if (!isoString) return '—';
  const d = new Date(isoString);
  return d.toLocaleDateString([], { day: 'numeric', month: 'short', year: 'numeric' });
}

function elapsed(startedAt) {
  if (!startedAt) return '';
  const secs = Math.floor((Date.now() - new Date(startedAt)) / 1000);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function statusColor(status) {
  const map = {
    running: 'var(--status-running)',
    needs_review: 'var(--status-review)',
    error: 'var(--status-error)',
    done: 'var(--status-done)',
    idle: 'var(--status-idle)',
  };
  return map[status] || 'var(--text-dim)';
}

// Simple markdown renderer
function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/^## (.+)$/gm, '<h2 style="color:var(--text-primary);font-size:1rem;margin:16px 0 8px;font-weight:600;">$1</h2>')
    .replace(/^### (.+)$/gm, '<h3 style="color:var(--text-secondary);font-size:0.9rem;margin:12px 0 6px;font-weight:600;">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, '<li style="margin:4px 0 4px 16px;color:var(--text-secondary);">$1</li>')
    .replace(/^(\d+\. .+)$/gm, '<li style="margin:4px 0 4px 16px;color:var(--text-secondary);">$1</li>')
    .replace(/\n\n/g, '<br/><br/>')
    .replace(/\n/g, '<br/>');
}

// ─── API Layer ────────────────────────────────────────────────────────────────

const API = {
  async get(path) {
    const r = await fetch(path);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  },
  async put(path, body) {
    const r = await fetch(path, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  },
};

// ─── Toast Manager ────────────────────────────────────────────────────────────

function ToastContainer({ toasts }) {
  return (
    <div style={{
      position: 'fixed', bottom: 100, right: 20,
      display: 'flex', flexDirection: 'column', gap: 8, zIndex: 9999
    }}>
      {toasts.map(t => (
        <div key={t.id}
          className={t.type === 'error' ? 'toast-error' : 'toast'}
          style={{
            background: t.type === 'error' ? 'var(--status-error)'
              : t.type === 'success' ? 'var(--accent)' : 'var(--bg-card-hover)',
            color: '#fff',
            padding: '10px 16px',
            borderRadius: 8,
            fontSize: '0.85rem',
            maxWidth: 320,
            boxShadow: '0 4px 12px rgba(0,0,0,0.5)',
          }}
        >{t.message}</div>
      ))}
    </div>
  );
}

// ─── Top Bar ──────────────────────────────────────────────────────────────────

function TopBar({ processes }) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(id);
  }, []);

  const running = processes.filter(p => p.status === 'running');
  const today = new Date().toLocaleDateString([], { weekday: 'long', day: 'numeric', month: 'long' });

  return (
    <div style={{
      height: 60, background: 'var(--bg-sidebar)',
      borderBottom: '1px solid var(--border)',
      display: 'flex', alignItems: 'center',
      padding: '0 24px', flexShrink: 0,
    }}>
      <span style={{ color: 'var(--accent)', fontWeight: 700, fontSize: '1.1rem', minWidth: 140 }}>
        PM Assistant
      </span>
      <div style={{ flex: 1, display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
        {running.map(p => (
          <div key={p.id} style={{
            display: 'flex', alignItems: 'center', gap: 6,
            background: 'var(--bg-card)', borderRadius: 20,
            padding: '4px 12px', fontSize: '0.8rem',
          }}>
            <span className="pulse" style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--accent)', display: 'inline-block' }} />
            <span style={{ color: 'var(--text-secondary)' }}>{p.name}</span>
            <span style={{ color: 'var(--text-dim)', fontVariantNumeric: 'tabular-nums' }}>
              {elapsed(p.started_at)}
            </span>
          </div>
        ))}
      </div>
      <span style={{ color: 'var(--text-secondary)', fontSize: '0.85rem', minWidth: 180, textAlign: 'right' }}>
        {today}
      </span>
    </div>
  );
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────

const NAV_ITEMS = [
  { id: 'report', label: 'Daily Report', icon: '◈' },
  { id: 'icm', label: 'ICM Pipeline', icon: '◎' },
  { id: 'agents', label: 'Agents', icon: '◉' },
  { id: 'settings', label: 'Settings', icon: '◇' },
];

function Sidebar({ activeView, setView, ollamaStatus, claudeStatus, linearStatus, wsConnected }) {
  return (
    <div style={{
      width: 240, background: 'var(--bg-sidebar)',
      borderRight: '1px solid var(--border)',
      display: 'flex', flexDirection: 'column',
      padding: '16px 0', flexShrink: 0,
    }}>
      <nav style={{ flex: 1, padding: '0 12px' }}>
        {NAV_ITEMS.map(item => {
          const active = activeView === item.id;
          return (
            <button key={item.id}
              onClick={() => setView(item.id)}
              style={{
                width: '100%', display: 'flex', alignItems: 'center', gap: 10,
                padding: '10px 12px', borderRadius: 6, border: 'none', cursor: 'pointer',
                background: active ? 'var(--accent)' : 'transparent',
                color: active ? '#fff' : 'var(--text-secondary)',
                fontSize: '0.9rem', fontWeight: active ? 600 : 400,
                marginBottom: 2, transition: 'background 0.15s',
              }}
              onMouseEnter={e => { if (!active) e.currentTarget.style.background = 'var(--bg-card)'; }}
              onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}
            >
              <span style={{ fontSize: '1rem' }}>{item.icon}</span>
              {item.label}
            </button>
          );
        })}
      </nav>
      <div style={{ padding: '12px 24px', borderTop: '1px solid var(--border)' }}>
        {!wsConnected && (
          <div style={{ color: 'var(--status-review)', fontSize: '0.75rem', marginBottom: 8 }}>
            ⚠ reconnecting...
          </div>
        )}
        <StatusDot label="Ollama" status={ollamaStatus === 'connected'} />
        <StatusDot label="Claude" status={claudeStatus === 'configured'} />
        <StatusDot label="Linear" status={linearStatus === 'configured'} />
      </div>
    </div>
  );
}

function StatusDot({ label, status }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
      <span style={{
        width: 8, height: 8, borderRadius: '50%', display: 'inline-block',
        background: status ? 'var(--accent)' : 'var(--status-error)',
      }} />
      <span style={{ color: 'var(--text-secondary)', fontSize: '0.8rem' }}>{label}</span>
    </div>
  );
}

// ─── Daily Report View ────────────────────────────────────────────────────────

function ReportView({ report, loading, onRunReport }) {
  if (loading) {
    return (
      <div style={{ padding: 24 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
          <h1 style={{ fontSize: '1.5rem', fontWeight: 700 }}>Daily Brief</h1>
        </div>
        <div className="shimmer" style={{ marginBottom: 16 }} />
        <div className="shimmer" style={{ marginBottom: 16 }} />
        <div className="shimmer" />
      </div>
    );
  }

  if (!report) {
    return (
      <div style={{ padding: 24, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%' }}>
        <div style={{ fontSize: '3rem', marginBottom: 16 }}>◈</div>
        <h2 style={{ color: 'var(--text-secondary)', marginBottom: 8 }}>No report yet</h2>
        <p style={{ color: 'var(--text-dim)', marginBottom: 24, textAlign: 'center', maxWidth: 360 }}>
          Click 'Run Report' to fetch your Linear status and generate today's brief.
        </p>
        <button onClick={onRunReport} style={accentBtn}>Run Report</button>
      </div>
    );
  }

  const content = report.content || {};
  const markdown = content.report_markdown || '';
  const generatedAt = content.generated_at;

  // Split the markdown into sections
  const sections = [];
  const sectionTitles = ['Today\'s Priorities', 'Blocked Items', 'Momentum', 'Recommended Actions'];
  let remaining = markdown;

  sectionTitles.forEach(title => {
    const idx = remaining.indexOf(`## ${title}`);
    if (idx !== -1) {
      const end = remaining.indexOf('\n## ', idx + 1);
      const sectionContent = end !== -1
        ? remaining.slice(idx, end)
        : remaining.slice(idx);
      sections.push({ title, content: sectionContent });
      if (end !== -1) remaining = remaining.slice(end);
    }
  });

  if (sections.length === 0 && markdown) {
    sections.push({ title: 'Report', content: markdown });
  }

  return (
    <div style={{ padding: 24, overflowY: 'auto', height: '100%' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
        <h1 style={{ fontSize: '1.5rem', fontWeight: 700 }}>Daily Brief</h1>
        <button onClick={onRunReport} style={accentBtn}>Run Report</button>
      </div>
      {generatedAt && (
        <p style={{ color: 'var(--text-dim)', fontSize: '0.8rem', marginBottom: 24 }}>
          Last updated: {formatDate(generatedAt)} {formatTime(generatedAt)}
        </p>
      )}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        {sections.map((s, i) => (
          <div key={i} style={{
            background: 'var(--bg-card)', borderRadius: 12,
            padding: 20, border: '1px solid var(--border)',
          }}>
            <div
              dangerouslySetInnerHTML={{ __html: renderMarkdown(s.content) }}
              style={{ lineHeight: 1.6, fontSize: '0.9rem' }}
            />
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── File Modal ───────────────────────────────────────────────────────────────

function FileModal({ file, onClose, addToast }) {
  const [editMode, setEditMode] = useState(false);
  const [editContent, setEditContent] = useState('');
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    setEditMode(false);
    setEditContent(file?.content || '');
  }, [file?.path]);

  if (!file) return null;

  const handleSave = async () => {
    setSaving(true);
    try {
      await API.put('/api/workspace/file', { path: file.path, content: editContent });
      file.content = editContent;
      addToast('File saved', 'success');
      setEditMode(false);
    } catch (err) {
      addToast(`Save failed: ${err.message}`, 'error');
    } finally {
      setSaving(false);
    }
  };

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100 }}
      onClick={onClose}>
      <div style={{ background: 'var(--bg-card)', borderRadius: 12, padding: 24,
        maxWidth: 800, maxHeight: '85vh', width: '92%', display: 'flex',
        flexDirection: 'column', gap: 16 }}
        onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <h3 style={{ fontFamily: 'monospace', fontSize: '0.95rem', color: 'var(--text-secondary)',
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '60%' }}>
            {file.name}
          </h3>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexShrink: 0 }}>
            {file.editable && !editMode && !file.loading && (
              <button onClick={() => { setEditContent(file.content || ''); setEditMode(true); }}
                style={{ ...accentBtn, background: 'var(--bg-card-hover)', padding: '5px 12px', fontSize: '0.8rem' }}>
                Edit
              </button>
            )}
            {editMode && (
              <>
                <button onClick={() => setEditMode(false)}
                  style={{ ...accentBtn, background: 'var(--text-dim)', padding: '5px 12px', fontSize: '0.8rem' }}>
                  Cancel
                </button>
                <button onClick={handleSave} disabled={saving}
                  style={{ ...accentBtn, padding: '5px 12px', fontSize: '0.8rem',
                    background: saving ? 'var(--text-dim)' : 'var(--accent)' }}>
                  {saving ? 'Saving…' : 'Save'}
                </button>
              </>
            )}
            <button onClick={onClose}
              style={{ background: 'none', border: 'none', color: 'var(--text-secondary)',
                cursor: 'pointer', fontSize: '1.2rem' }}>✕</button>
          </div>
        </div>

        {/* Body */}
        <div style={{ overflowY: 'auto', flex: 1, minHeight: 200 }}>
          {file.loading ? (
            <div className="shimmer" style={{ height: 200 }} />
          ) : editMode ? (
            <textarea value={editContent} onChange={e => setEditContent(e.target.value)}
              style={{ width: '100%', minHeight: 400, background: 'var(--bg-base)',
                color: 'var(--text-primary)', border: '1px solid var(--border)',
                borderRadius: 8, padding: 16, fontFamily: 'monospace', fontSize: '0.85rem',
                lineHeight: 1.6, resize: 'vertical', outline: 'none' }} />
          ) : (
            <div dangerouslySetInnerHTML={{ __html: renderMarkdown(file.content || '') }}
              style={{ lineHeight: 1.6, fontSize: '0.9rem', color: 'var(--text-secondary)' }} />
          )}
        </div>
      </div>
    </div>
  );
}

// ─── ICM Pipeline View ────────────────────────────────────────────────────────

function ICMView({ stages, tokenStreams, onRunStage, onMarkDone, addToast }) {
  const [expanded, setExpanded] = useState(null);
  const [previewFile, setPreviewFile] = useState(null);

  const toggleExpand = (stageNum) => {
    setExpanded(prev => prev === stageNum ? null : stageNum);
  };

  const openFile = async (filePath, fileName, editable) => {
    setPreviewFile({ name: fileName, path: filePath, content: null, editable, loading: true });
    try {
      const data = await API.get(`/api/workspace/file?path=${encodeURIComponent(filePath)}`);
      setPreviewFile({ name: fileName, path: filePath, content: data.content, editable, loading: false });
    } catch (err) {
      addToast(`Could not open file: ${err.message}`, 'error');
      setPreviewFile(null);
    }
  };

  const promoteFile = async (filePath, fileName) => {
    try {
      await API.post('/api/workspace/promote', { path: filePath });
      addToast(`${fileName} promoted to trusted`, 'success');
      // Re-fetch intake file list by briefly collapsing then re-expanding
      setExpanded(null);
      setTimeout(() => setExpanded(1), 50);
    } catch (err) {
      addToast(`Promote failed: ${err.message}`, 'error');
    }
  };

  return (
    <div style={{ padding: 24, overflowY: 'auto', height: '100%' }}>
      <h1 style={{ fontSize: '1.5rem', fontWeight: 700, marginBottom: 24 }}>ICM Pipeline</h1>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {stages.map(stage => (
          <StageCard
            key={stage.stage_number}
            stage={stage}
            expanded={expanded === stage.stage_number}
            onToggle={() => toggleExpand(stage.stage_number)}
            tokenStream={tokenStreams[stage.stage_name] || ''}
            onRunStage={onRunStage}
            onMarkDone={onMarkDone}
            onOpenFile={openFile}
            onPromote={promoteFile}
          />
        ))}
      </div>
      <FileModal file={previewFile} onClose={() => setPreviewFile(null)} addToast={addToast} />
    </div>
  );
}

function StageCard({ stage, expanded, onToggle, tokenStream, onRunStage, onMarkDone, onOpenFile, onPromote }) {
  const tokenRef = useRef(null);
  const [inputFiles, setInputFiles] = useState([]);
  const [outputFiles, setOutputFiles] = useState([]);
  const [filesLoading, setFilesLoading] = useState(false);

  useEffect(() => {
    if (tokenRef.current && tokenStream) {
      tokenRef.current.scrollTop = tokenRef.current.scrollHeight;
    }
  }, [tokenStream]);

  useEffect(() => {
    if (!expanded) return;
    const stagePath = `0${stage.stage_number}_${stage.stage_name}`;

    const fetchFiles = async () => {
      setFilesLoading(true);
      try {
        if (stage.stage_number === 1) {
          const [tData, qData] = await Promise.all([
            API.get('/api/workspace/files?dir=01_intake%2Ftrusted'),
            API.get('/api/workspace/files?dir=01_intake%2Fquarantine'),
          ]);
          // quarantine = needs review (left/input), trusted = ready for discovery (right/output)
          setInputFiles(qData.files.map(f => ({ ...f, label: f.name })));
          setOutputFiles(tData.files.map(f => ({ ...f, label: f.name })));
        } else {
          const [inData, outData] = await Promise.all([
            API.get(`/api/workspace/files?dir=${encodeURIComponent(stagePath + '/input')}`),
            API.get(`/api/workspace/files?dir=${encodeURIComponent(stagePath + '/output')}`),
          ]);
          setInputFiles(inData.files.map(f => ({ ...f, label: f.name })));
          setOutputFiles(outData.files
            .sort((a, b) => b.modified.localeCompare(a.modified))
            .slice(0, 5)
            .map(f => ({ ...f, label: f.name })));
        }
      } catch { /* non-critical */ }
      finally { setFilesLoading(false); }
    };

    fetchFiles();
  }, [expanded, stage.stage_number, stage.stage_name]);

  const canRun = ['idle', 'done', 'error', 'needs_review'].includes(stage.status);
  const isRunning = stage.status === 'running';
  const needsReview = stage.status === 'needs_review';
  const isIntake = stage.stage_number === 1;

  return (
    <div style={{
      background: 'var(--bg-card)', borderRadius: 12,
      border: `1px solid ${isRunning ? 'var(--accent)' : needsReview ? 'var(--status-review)' : 'var(--border)'}`,
      overflow: 'hidden', transition: 'border-color 0.2s',
    }}>
      {/* Card header */}
      <div
        onClick={onToggle}
        style={{
          display: 'flex', alignItems: 'center', gap: 16,
          padding: '16px 20px', cursor: 'pointer',
        }}
      >
        <div style={{
          width: 32, height: 32, borderRadius: '50%',
          background: 'var(--accent)', display: 'flex', alignItems: 'center',
          justifyContent: 'center', fontWeight: 700, fontSize: '0.85rem', flexShrink: 0,
        }}>
          {stage.stage_number}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 600, textTransform: 'capitalize', marginBottom: 2 }}>
            {stage.stage_name}
          </div>
          {stage.last_run_at && (
            <div style={{ color: 'var(--text-dim)', fontSize: '0.75rem' }}>
              Last run: {formatDate(stage.last_run_at)} {formatTime(stage.last_run_at)}
            </div>
          )}
        </div>
        <div style={{
          padding: '3px 10px', borderRadius: 20, fontSize: '0.75rem', fontWeight: 600,
          background: `${statusColor(stage.status)}22`,
          color: statusColor(stage.status),
          textTransform: 'uppercase', letterSpacing: '0.5px',
        }}>
          {stage.status.replace('_', ' ')}
        </div>
        {!isIntake && canRun && (
          <button

function AgentsView({ processes, onRunReport, focusedAgentId }) {
  const [expandedId, setExpandedId] = useState(null);
  const cardRefs = useRef({});

  // Auto-expand and scroll when a process panel click navigates here
  useEffect(() => {
    if (!focusedAgentId) return;
    setExpandedId(focusedAgentId);
    const el = cardRefs.current[focusedAgentId];
    if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
  }, [focusedAgentId]);

  return (
    <div style={{ padding: 24, overflowY: 'auto', height: '100%' }}>
      <h1 style={{ fontSize: '1.5rem', fontWeight: 700, marginBottom: 24 }}>Agents</h1>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {AGENT_DEFS.map(agent => {
          const agentRuns = processes
            .filter(p => p.type === agent.processType)
            .sort((a, b) => (b.started_at || '').localeCompare(a.started_at || ''));
          const lastRun = agentRuns[0];
          const isExpanded = expandedId === agent.id;
          const isFocused = focusedAgentId === agent.id;

          return (
            <div
              key={agent.id}
              ref={el => { cardRefs.current[agent.id] = el; }}
              style={{
                background: 'var(--bg-card)', borderRadius: 12,
                border: `1px solid ${isFocused ? 'var(--accent)' : 'var(--border)'}`,
                overflow: 'hidden', transition: 'border-color 0.2s',
              }}
            >
              {/* Header row */}
              <div
                onClick={() => setExpandedId(isExpanded ? null : agent.id)}
                style={{
                  padding: '16px 20px', cursor: 'pointer',
                  display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                }}
              >
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, marginBottom: 4 }}>{agent.name}</div>
                  <div style={{ color: 'var(--text-secondary)', fontSize: '0.85rem', marginBottom: 4 }}>
                    {agent.description}
                  </div>
                  {lastRun && (
                    <div style={{ color: 'var(--text-dim)', fontSize: '0.75rem' }}>
                      Last run: {formatDate(lastRun.started_at)} {formatTime(lastRun.started_at)} —{' '}
                      <span style={{ color: statusColor(lastRun.status) }}>{lastRun.status}</span>
                    </div>
                  )}
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
                  {lastRun && (
                    <span style={{
                      padding: '3px 10px', borderRadius: 20, fontSize: '0.75rem',
                      background: `${statusColor(lastRun.status)}22`,
                      color: statusColor(lastRun.status),
                    }}>
                      {lastRun.status === 'running' && <span className="spinner" style={{ marginRight: 5, verticalAlign: 'middle' }} />}
                      {lastRun.status.replace('_', ' ')}
                    </span>
                  )}
                  {agent.id === 'linear_report' && (
                    <button onClick={e => { e.stopPropagation(); onRunReport(); }} style={accentBtn}>Run</button>
                  )}
                  <span style={{ color: 'var(--text-dim)', fontSize: '0.9rem' }}>
                    {isExpanded ? '▲' : '▼'}
                  </span>
                </div>
              </div>

              {/* Expanded: recent runs */}
              {isExpanded && (
                <div style={{ borderTop: '1px solid var(--border)', padding: '16px 20px' }}>
                  <h4 style={{ color: 'var(--text-secondary)', fontSize: '0.8rem', marginBottom: 12,
                    textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                    Recent Runs
                  </h4>
                  {agentRuns.length === 0 ? (
                    <p style={{ color: 'var(--text-dim)', fontSize: '0.85rem' }}>No runs yet.</p>
                  ) : agentRuns.slice(0, 5).map(run => (
                    <div key={run.id} style={{
                      padding: '10px 14px', borderRadius: 8, marginBottom: 8,
                      background: 'var(--bg-base)', border: '1px solid var(--border)',
                    }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                        <span style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>
                          {formatDate(run.started_at)} {formatTime(run.started_at)}
                        </span>
                        <span style={{
                          fontSize: '0.75rem', padding: '2px 8px', borderRadius: 12,
                          background: `${statusColor(run.status)}22`, color: statusColor(run.status),
                        }}>
                          {run.status === 'running' && <span className="spinner" style={{ marginRight: 4, verticalAlign: 'middle' }} />}
                          {run.status.replace('_', ' ')}
                        </span>
                      </div>
                      {run.status === 'running' && run.started_at && (
                        <div style={{ color: 'var(--accent)', fontSize: '0.75rem' }}>
                          Running… {elapsed(run.started_at)}
                        </div>
                      )}
                      {run.output_summary && (
                        <div style={{ color: 'var(--text-dim)', fontSize: '0.78rem', marginTop: 4,
                          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '100%' }}>
                          {run.output_summary}
                        </div>
                      )}
                      {run.error_message && (
                        <div style={{ color: 'var(--status-error)', fontSize: '0.78rem', marginTop: 4 }}>
                          ✕ {run.error_message}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Chat Bar ─────────────────────────────────────────────────────────────────

function ChatBar({ chatHistory, onSend, loading }) {
  const [message, setMessage] = useState('');
  const [focused, setFocused] = useState(false);
  const inputRef = useRef(null);
  const historyRef = useRef(null);

  useEffect(() => {
    if (historyRef.current && focused) {
      historyRef.current.scrollTop = historyRef.current.scrollHeight;
    }
  }, [chatHistory, focused]);

  const send = () => {
    const trimmed = message.trim();
    if (!trimmed || loading) return;
    onSend(trimmed);
    setMessage('');
  };

  const visibleHistory = chatHistory.slice(-5);

  return (
    <div style={{
      height: focused ? 'auto' : 80,
      background: '#0a0a0a',
      borderTop: '1px solid var(--border)',
      flexShrink: 0,
      display: 'flex',
      flexDirection: 'column',
      transition: 'height 0.2s ease',
    }}>
      {/* Chat history panel */}
      {focused && visibleHistory.length > 0 && (
        <div
          ref={historyRef}
          className="slide-up"
          style={{
            maxHeight: 240, overflowY: 'auto',
            padding: '12px 20px', display: 'flex', flexDirection: 'column', gap: 8,
          }}
        >
          {visibleHistory.map((msg, i) => (
            <div key={i} style={{
              display: 'flex',
              justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start',
            }}>
              <div style={{
                maxWidth: '70%', padding: '8px 12px', borderRadius: 10,
                background: msg.role === 'user' ? '#1DB95433' : 'var(--bg-card)',
                color: 'var(--text-secondary)', fontSize: '0.85rem', lineHeight: 1.5,
                border: '1px solid var(--border)',
              }}>
                {msg.content}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Input row */}
      <div style={{
        height: 80, display: 'flex', alignItems: 'center',
        padding: '0 20px', gap: 12,
      }}>
        <input
          ref={inputRef}
          value={message}
          onChange={e => setMessage(e.target.value)}
          onFocus={() => setFocused(true)}
          onBlur={() => setTimeout(() => setFocused(false), 150)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          placeholder="Ask the orchestrator anything, or give a command..."
          style={{
            flex: 1, background: 'var(--bg-card)', border: '1px solid var(--border)',
            borderRadius: 24, padding: '12px 18px', color: 'var(--text-primary)',
            fontSize: '0.9rem', outline: 'none',
            transition: 'border-color 0.15s',
          }}
          onFocusCapture={e => { e.target.style.borderColor = 'var(--accent)'; }}
          onBlurCapture={e => { e.target.style.borderColor = 'var(--border)'; }}
        />
        <button
          onClick={send}
          disabled={loading || !message.trim()}
          style={{
            width: 44, height: 44, borderRadius: '50%', border: 'none',
            background: loading || !message.trim() ? 'var(--text-dim)' : 'var(--accent)',
            color: '#fff', cursor: loading || !message.trim() ? 'not-allowed' : 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: '1.1rem', flexShrink: 0, transition: 'background 0.15s',
          }}
        >
          {loading ? '○' : '→'}
        </button>
      </div>
    </div>
  );
}

// ─── Process Panel ────────────────────────────────────────────────────────────

function processTypeToAgentId(type) {
  const map = {
    linear_report: 'linear_report',
    icm_stage_2: 'icm_discovery',
    icm_stage_3: 'icm_opportunity',
    icm_stage_4: 'icm_prd',
    icm_stage_5: 'icm_critique',
    icm_stage_6: 'icm_stories',
  };
  return map[type] || null;
}

function ProcessPanel({ processes, onNavigate }) {
  const [open, setOpen] = useState(true);
  const [tick, setTick] = useState(0);

  // Re-render every second so elapsed timers update
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(id);
  }, []);

  // Newest first, capped at 20
  const sorted = [...processes]
    .sort((a, b) => (b.started_at || '').localeCompare(a.started_at || ''))
    .slice(0, 20);

  return (
    <div style={{
      width: open ? 260 : 36,
      flexShrink: 0,
      borderLeft: '1px solid var(--border)',
      background: 'var(--bg-sidebar)',
      display: 'flex',
      flexDirection: 'column',
      transition: 'width 0.2s ease',
      overflow: 'hidden',
      position: 'relative',
    }}>
      {/* Toggle button */}
      <button
        onClick={() => setOpen(o => !o)}
        title={open ? 'Collapse process panel' : 'Expand process panel'}
        style={{
          position: 'absolute', top: 12, right: 8, zIndex: 10,
          background: 'none', border: 'none', color: 'var(--text-dim)',
          cursor: 'pointer', fontSize: '0.85rem', padding: 4,
          flexShrink: 0,
        }}
      >
        {open ? '›' : '‹'}
      </button>

      {open && (
        <>
          <div style={{
            padding: '13px 16px 11px',
            borderBottom: '1px solid var(--border)',
            fontSize: '0.75rem', fontWeight: 600, letterSpacing: '0.5px',
            textTransform: 'uppercase', color: 'var(--text-secondary)',
            whiteSpace: 'nowrap',
          }}>
            Processes
          </div>

          <div style={{ flex: 1, overflowY: 'auto' }}>
            {sorted.length === 0 && (
              <div style={{ padding: '20px 16px', color: 'var(--text-dim)', fontSize: '0.8rem' }}>
                No processes yet.
              </div>
            )}
            {sorted.map(p => {
              const isRunning = p.status === 'running';
              const agentId = processTypeToAgentId(p.type);
              const clickable = !!agentId;

              return (
                <div
                  key={p.id}
                  onClick={() => clickable && onNavigate(agentId)}
                  style={{
                    padding: '10px 14px',
                    borderBottom: '1px solid var(--border)',
                    cursor: clickable ? 'pointer' : 'default',
                    transition: 'background 0.1s',
                    display: 'flex', flexDirection: 'column', gap: 4,
                  }}
                  onMouseEnter={e => { if (clickable) e.currentTarget.style.background = 'var(--bg-card)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; }}
                >
                  {/* Name + spinner/dot */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                    {isRunning
                      ? <span className="spinner" />
                      : <span style={{
                          width: 7, height: 7, borderRadius: '50%', flexShrink: 0,
                          background: statusColor(p.status),
                        }} />
                    }
                    <span style={{
                      fontSize: '0.82rem', fontWeight: 500, color: 'var(--text-primary)',
                      overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                      flex: 1,
                    }}>
                      {p.name}
                    </span>
                  </div>

                  {/* Time info */}
                  <div style={{ paddingLeft: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontSize: '0.72rem', color: 'var(--text-dim)' }}>
                      {formatTime(p.started_at)}
                    </span>
                    {isRunning ? (
                      <span style={{ fontSize: '0.72rem', color: 'var(--accent)', fontVariantNumeric: 'tabular-nums' }}>
                        {elapsed(p.started_at)}
                      </span>
                    ) : (
                      <span style={{
                        fontSize: '0.7rem', color: statusColor(p.status),
                        textTransform: 'uppercase', letterSpacing: '0.3px',
                      }}>
                        {p.status.replace('_', ' ')}
                      </span>
                    )}
                  </div>

                  {/* Error hint */}
                  {p.status === 'error' && p.error_message && (
                    <div style={{
                      paddingLeft: 14, fontSize: '0.7rem', color: 'var(--status-error)',
                      overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                    }}>
                      {p.error_message}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// ─── Shared Button Style ──────────────────────────────────────────────────────

const accentBtn = {
  background: 'var(--accent)',
  color: '#fff',
  border: 'none',
  borderRadius: 20,
  padding: '8px 18px',
  fontSize: '0.85rem',
  fontWeight: 600,
  cursor: 'pointer',
  transition: 'background 0.15s',
};

// ─── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [activeView, setActiveView] = useState('report');
  const [processes, setProcesses] = useState([]);
  const [icmStages, setIcmStages] = useState([]);
  const [ollamaStatus, setOllamaStatus] = useState('disconnected');
  const [claudeStatus, setClaudeStatus] = useState('not_configured');
  const [linearStatus, setLinearStatus] = useState('not_configured');
  const [report, setReport] = useState(null);
  const [reportLoading, setReportLoading] = useState(false);
  const [chatHistory, setChatHistory] = useState([]);
  const [chatLoading, setChatLoading] = useState(false);
  const [tokenStreams, setTokenStreams] = useState({});
  const [toasts, setToasts] = useState([]);
  const [wsConnected, setWsConnected] = useState(false);
  const [focusedAgentId, setFocusedAgentId] = useState(null);
  const wsRef = useRef(null);
  const reconnectDelay = useRef(1000);
  const toastId = useRef(0);

  const addToast = useCallback((message, type = 'info') => {
    const id = ++toastId.current;
    setToasts(prev => [...prev, { id, message, type }]);
    const timeout = type === 'error' ? 5000 : 3000;
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), timeout);
  }, []);

  // Initial data load
  useEffect(() => {
    loadStatus();
    loadReport();
    loadChatHistory();
  }, []);

  // Poll every 30s as fallback
  useEffect(() => {
    const id = setInterval(loadStatus, 30000);
    return () => clearInterval(id);
  }, []);

  async function loadStatus() {
    try {
      const data = await API.get('/api/status');
      setProcesses(data.processes || []);
      setIcmStages(data.icm_stages || []);
      setOllamaStatus(data.ollama_status);
      setClaudeStatus(data.claude_status);
      setLinearStatus(data.linear_status || 'not_configured');
    } catch {}
  }

  async function loadReport() {
    try {
      const data = await API.get('/api/reports/latest');
      setReport(data.report);
    } catch {}
  }

  async function loadChatHistory() {
    try {
      const data = await API.get('/api/chat/history');
      setChatHistory(data.messages || []);
    } catch {}
  }

  // WebSocket connection with exponential backoff
  const connectWS = useCallback(() => {
    if (wsRef.current && wsRef.current.readyState < 2) return;

    const ws = new WebSocket(`ws://${window.location.host}/ws/updates`);
    wsRef.current = ws;

    ws.onopen = () => {
      setWsConnected(true);
      reconnectDelay.current = 1000;
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        handleWSMessage(msg);
      } catch {}
    };

    ws.onclose = () => {
      setWsConnected(false);
      const delay = reconnectDelay.current;
      reconnectDelay.current = Math.min(delay * 2, 30000);
      setTimeout(connectWS, delay);
    };

    ws.onerror = () => ws.close();
  }, []);

  useEffect(() => {
    connectWS();
    return () => {
      if (wsRef.current) wsRef.current.close();
    };
  }, [connectWS]);

  function handleWSMessage(msg) {
    switch (msg.type) {
      case 'status_snapshot':
        if (msg.processes) setProcesses(msg.processes);
        if (msg.icm_stages) setIcmStages(msg.icm_stages);
        if (msg.ollama_status) setOllamaStatus(msg.ollama_status);
        if (msg.claude_status) setClaudeStatus(msg.claude_status);
        if (msg.linear_status) setLinearStatus(msg.linear_status);
        break;

      case 'process_update':
        setProcesses(prev => {
          const idx = prev.findIndex(p => p.id === msg.process_id);
          if (idx === -1) {
            return [...prev, {
              id: msg.process_id, name: msg.name || 'Process',
              status: msg.status, type: 'unknown',
              started_at: new Date().toISOString(),
            }];
          }
          const updated = [...prev];
          updated[idx] = { ...updated[idx], status: msg.status };
          return updated;
        });
        // Refresh stages on process update
        loadStatus();
        break;

      case 'token_stream':
        if (msg.stage) {
          setTokenStreams(prev => ({
            ...prev,
            [msg.stage]: (prev[msg.stage] || '') + (msg.token || ''),
          }));
        }
        break;

      case 'report_complete':
        loadReport();
        addToast('Daily report ready!', 'success');
        break;

      case 'error':
        addToast(msg.message || 'An error occurred', 'error');
        break;

      case 'ping':
        if (wsRef.current && wsRef.current.readyState === 1) {
          wsRef.current.send('ping');
        }
        break;
    }
  }

  async function runReport() {
    setReportLoading(true);
    try {
      await API.post('/api/agents/linear-report/run', {});
      addToast('Report generation started', 'info');
      await loadStatus();
    } catch (err) {
      addToast(`Failed to start report: ${err.message}`, 'error');
    } finally {
      setReportLoading(false);
    }
  }

  async function runStage(stageNumber) {
    try {
      await API.post(`/api/icm/run/${stageNumber}`, {});
      addToast(`Stage ${stageNumber} started`, 'info');
      setTokenStreams(prev => {
        const stageName = ['','intake','discovery','opportunity','prd','critique','stories'][stageNumber];
        return { ...prev, [stageName]: '' };
      });
      await loadStatus();
    } catch (err) {
      addToast(`Failed to start stage ${stageNumber}: ${err.message}`, 'error');
    }
  }

  async function markStageDone(stageNumber) {
    // Update ICM stage status to done via chat command
    try {
      await API.post('/api/chat', { message: `Mark stage ${stageNumber} as done` });
      await loadStatus();
      addToast('Stage marked as done', 'success');
    } catch (err) {
      addToast('Could not update stage status', 'error');
    }
  }

  async function sendChat(message) {
    setChatLoading(true);
    setChatHistory(prev => [...prev, { role: 'user', content: message, id: Date.now() }]);
    try {
      const data = await API.post('/api/chat', { message });
      setChatHistory(prev => [...prev, { role: 'assistant', content: data.response, id: Date.now() + 1 }]);
      if (data.action_triggered) {
        addToast(`Action triggered: ${data.action_triggered}`, 'info');
        await loadStatus();
      }
    } catch (err) {
      addToast(`Chat error: ${err.message}`, 'error');
      setChatHistory(prev => prev.slice(0, -1));
    } finally {
      setChatLoading(false);
    }
  }

  const mainContent = () => {
    switch (activeView) {
      case 'report':
        return <ReportView report={report} loading={reportLoading} onRunReport={runReport} />;
      case 'icm':
        return <ICMView stages={icmStages} tokenStreams={tokenStreams} onRunStage={runStage} onMarkDone={markStageDone} addToast={addToast} />;
      case 'agents':
        return <AgentsView processes={processes} onRunReport={runReport} focusedAgentId={focusedAgentId} />;
      case 'settings':
        return <SettingsView ollamaStatus={ollamaStatus} claudeStatus={claudeStatus} linearStatus={linearStatus} />;
      default:
        return null;
    }
  };

  return (
    <>
      <TopBar processes={processes} />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <Sidebar
          activeView={activeView}
          setView={setActiveView}
          ollamaStatus={ollamaStatus}
          claudeStatus={claudeStatus}
          linearStatus={linearStatus}
          wsConnected={wsConnected}
        />
        <main style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          <div style={{ flex: 1, overflow: 'hidden', display: 'flex' }}>
            <div style={{ flex: 1, overflow: 'hidden' }}>
              {mainContent()}
            </div>
            <ProcessPanel
              processes={processes}
              onNavigate={(agentId) => {
                setFocusedAgentId(null);           // reset first so useEffect fires even on re-click
                setTimeout(() => {
                  setActiveView('agents');
                  setFocusedAgentId(agentId);
                }, 0);
              }}
            />
          </div>
        </main>
      </div>
      <ChatBar chatHistory={chatHistory} onSend={sendChat} loading={chatLoading} />
      <ToastContainer toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
