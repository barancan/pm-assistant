// ─── Chat Bar ─────────────────────────────────────────────────────────────────

function parseAction(action) {
  if (!action) return null;
  if (action === 'run_linear_report') return { label: 'Running Daily Report', view: 'report' };
  if (action.startsWith('run_icm_stage:')) {
    const num = parseInt(action.split(':')[1], 10);
    const names = { 2: 'Discovery', 3: 'Opportunity', 4: 'PRD', 5: 'Critique', 6: 'Stories' };
    return { label: `Running Stage ${num} · ${names[num] || ''}`, view: 'icm' };
  }
  return { label: action, view: null };
}

function ChatBar({ chatHistory, onSend, onNavigate, onClear, loading }) {
  const [message, setMessage] = useState('');
  const [focused, setFocused] = useState(false);
  const inputRef = useRef(null);
  const historyRef = useRef(null);

  useEffect(() => {
    if (historyRef.current && focused) {
      historyRef.current.scrollTop = historyRef.current.scrollHeight;
    }
  }, [chatHistory, focused]);

  const send = () => {
    const trimmed = message.trim();
    if (!trimmed || loading) return;
    onSend(trimmed);
    setMessage('');
  };

  const visibleHistory = chatHistory.slice(-5);

  return (
    <div style={{
      height: focused ? 'auto' : 80,
      background: '#0a0a0a',
      borderTop: '1px solid var(--border)',
      flexShrink: 0,
      display: 'flex',
      flexDirection: 'column',
      transition: 'height 0.2s ease',
    }}>
      {/* Chat history panel */}
      {focused && visibleHistory.length > 0 && (
        <div
          ref={historyRef}
          className="slide-up"
          style={{
            maxHeight: 240, overflowY: 'auto',
            padding: '12px 20px 8px', display: 'flex', flexDirection: 'column', gap: 8,
          }}
        >
          {/* Clear button */}
          {onClear && (
            <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
              <button
                onClick={onClear}
                style={{ background: 'none', border: 'none', cursor: 'pointer',
                  color: 'var(--text-dim)', fontSize: '0.72rem', padding: '2px 6px' }}
                title="Clear chat history"
              >
                Clear history
              </button>
            </div>
          )}
          {visibleHistory.map((msg, i) => {
            const parsed = msg.role === 'assistant' ? parseAction(msg.action_triggered) : null;
            const ts = msg.created_at || (msg.id ? new Date(msg.id).toISOString() : null);
            return (
              <div key={i} style={{
                display: 'flex',
                justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start',
              }}>
                <div style={{
                  maxWidth: '75%', padding: '8px 12px', borderRadius: 10,
                  background: msg.role === 'user' ? '#1DB95433' : 'var(--bg-card)',
                  color: 'var(--text-secondary)', fontSize: '0.85rem', lineHeight: 1.5,
                  border: '1px solid var(--border)',
                }}>
                  {msg.content}
                  {ts && (
                    <div style={{ marginTop: 4, fontSize: '0.68rem', color: 'var(--text-dim)',
                      textAlign: msg.role === 'user' ? 'right' : 'left' }}>
                      {formatTime(ts)}
                    </div>
                  )}
                  {parsed && (
                    <div style={{
                      marginTop: 8, paddingTop: 8,
                      borderTop: '1px solid var(--border)',
                      display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap',
                    }}>
                      <span style={{
                        fontSize: '0.75rem', color: 'var(--status-running)',
                        display: 'flex', alignItems: 'center', gap: 4,
                      }}>
                        <span className="spinner" style={{ width: 10, height: 10, borderWidth: 1.5 }} />
                        {parsed.label}
                      </span>
                      {parsed.view && onNavigate && (
                        <button
                          onClick={() => onNavigate(parsed.view)}
                          style={{
                            background: 'none', border: 'none', padding: '1px 6px',
                            borderRadius: 4, cursor: 'pointer', fontSize: '0.73rem',
                            color: 'var(--accent)', textDecoration: 'underline',
                          }}
                        >
                          View →
                        </button>
                      )}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Input row */}
      <div style={{
        height: 80, display: 'flex', alignItems: 'center',
        padding: '0 20px', gap: 12,
      }}>
        <input
          ref={inputRef}
          value={message}
          onChange={e => setMessage(e.target.value)}
          onFocus={() => setFocused(true)}
          onBlur={() => setTimeout(() => setFocused(false), 150)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          placeholder="Ask the orchestrator anything, or give a command..."
          style={{

            borderRadius: 24, padding: '12px 18px', color: 'var(--text-primary)',

// ─── Process Panel ────────────────────────────────────────────────────────────

function processTypeToAgentId(type) {
  const map = {
    linear_report: 'linear_report',
    icm_stage_2: 'icm_discovery',
    icm_stage_3: 'icm_opportunity',
    icm_stage_4: 'icm_prd',
    icm_stage_5: 'icm_critique',
    icm_stage_6: 'icm_stories',
  };
  return map[type] || null;
}

const PROCESS_HIDE_AFTER_MS = 60 * 1000; // 60 seconds after completion

function ProcessPanel({ processes, onNavigate, onCancel }) {
  const [open, setOpen] = useState(true);
  const [tick, setTick] = useState(0);
  const [cancelling, setCancelling] = useState({});
  const [confirmingCancel, setConfirmingCancel] = useState(new Set());
  // Set of process IDs manually dismissed by the user (errors)
  const [dismissed, setDismissed] = useState(new Set());
  // Timestamp (ms) when each non-running process was first seen as completed
  const completedAtRef = useRef({});

  // Re-render every second so elapsed timers and auto-hide countdown update
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(id);
  }, []);

  // Track when each process transitions to a completed state
  useEffect(() => {
    const now = Date.now();
    processes.forEach(p => {
      if (p.status !== 'running' && !completedAtRef.current[p.id]) {
        // Use the DB completed_at if available, else now
        completedAtRef.current[p.id] = p.completed_at
          ? new Date(p.completed_at).getTime()
          : now;
      }
    });
  }, [processes]);

  const now = Date.now();

  // Filter: always show running; show errors until dismissed; hide others after 60s
  const sorted = [...processes]
    .sort((a, b) => (b.started_at || '').localeCompare(a.started_at || ''))
    .filter(p => {
      if (p.status === 'running') return true;
      if (dismissed.has(p.id)) return false;
      if (p.status === 'error') return true; // persist until dismissed
      const completedAt = completedAtRef.current[p.id] || now;
      return (now - completedAt) < PROCESS_HIDE_AFTER_MS;
    })
    .slice(0, 20);

  const hasCompleted = processes.some(p =>
    p.status !== 'running' && p.status !== 'error' && !dismissed.has(p.id)
  );

  const clearCompleted = () => {
    const ids = processes
      .filter(p => p.status !== 'running' && p.status !== 'error')
      .map(p => p.id);
    setDismissed(prev => new Set([...prev, ...ids]));
  };

  const dismissError = (id) => {
    setDismissed(prev => new Set([...prev, id]));
  };

  return (
    <div style={{
      width: open ? 260 : 36,
      flexShrink: 0,
      borderLeft: '1px solid var(--border)',
      background: 'var(--bg-sidebar)',
      display: 'flex',
      flexDirection: 'column',
      transition: 'width 0.2s ease',
      overflow: 'hidden',
      position: 'relative',
    }}>
      {/* Toggle button */}
      <button
        onClick={() => setOpen(o => !o)}
        title={open ? 'Collapse process panel' : 'Expand process panel'}
        style={{
          position: 'absolute', top: 12, right: 8, zIndex: 10,
          background: 'none', border: 'none', color: 'var(--text-dim)',
          cursor: 'pointer', fontSize: '0.85rem', padding: 4,
          flexShrink: 0,
        }}
      >
        {open ? '›' : '‹'}
      </button>

      {open && (
        <>
          {/* Header */}
          <div style={{
            padding: '13px 16px 11px',
            borderBottom: '1px solid var(--border)',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            gap: 8,
          }}>
            <span style={{
              fontSize: '0.75rem', fontWeight: 600, letterSpacing: '0.5px',
              textTransform: 'uppercase', color: 'var(--text-secondary)',
              whiteSpace: 'nowrap',
            }}>
              Processes
            </span>
            {hasCompleted && (
              <button
                onClick={clearCompleted}
                title="Clear completed processes"
                style={{
                  background: 'none', border: 'none', color: 'var(--text-dim)',
                  cursor: 'pointer', fontSize: '0.7rem', padding: '2px 6px',
                  borderRadius: 4, whiteSpace: 'nowrap',
                  transition: 'color 0.15s',
                }}
                onMouseEnter={e => e.currentTarget.style.color = 'var(--text-secondary)'}
                onMouseLeave={e => e.currentTarget.style.color = 'var(--text-dim)'}
              >
                Clear
              </button>
            )}
          </div>

          <div style={{ flex: 1, overflowY: 'auto' }}>
            {sorted.length === 0 && (
              <div style={{ padding: '20px 16px', color: 'var(--text-dim)', fontSize: '0.8rem' }}>
                No active processes.
              </div>
            )}
            {sorted.map(p => {
              const isRunning = p.status === 'running';
              const isError = p.status === 'error';
              const agentId = processTypeToAgentId(p.type);
              const clickable = !!agentId;

              // Countdown for non-error completed processes
              let countdown = null;
              if (!isRunning && !isError) {
                const completedAt = completedAtRef.current[p.id];
                if (completedAt) {
                  const remaining = Math.max(0, Math.ceil((PROCESS_HIDE_AFTER_MS - (now - completedAt)) / 1000));
                  if (remaining <= 15) countdown = remaining;
                }
              }

              return (
                <div
                  key={p.id}
                  onClick={() => clickable && onNavigate(agentId)}
                  style={{
                    padding: '10px 14px',
                    borderBottom: '1px solid var(--border)',
                    cursor: clickable ? 'pointer' : 'default',
                    transition: 'background 0.1s',
                    display: 'flex', flexDirection: 'column', gap: 4,
                    opacity: !isRunning && !isError ? 0.75 : 1,
                  }}
                  onMouseEnter={e => { if (clickable) e.currentTarget.style.background = 'var(--bg-card)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; }}
                >
                  {/* Name + spinner/dot + kill/dismiss button */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                    {isRunning
                      ? <span className="spinner" />
                      : <span style={{
                          width: 7, height: 7, borderRadius: '50%', flexShrink: 0,
                          background: statusColor(p.status),
                        }} />
                    }
                    <span style={{
                      fontSize: '0.82rem', fontWeight: 500, color: 'var(--text-primary)',
                      overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                      flex: 1,
                    }}>
                      {p.name}
                    </span>
                    {isRunning && (
                      confirmingCancel.has(p.id) ? (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexShrink: 0 }}>
                          <span style={{ fontSize: '0.72rem', color: 'var(--text-dim)' }}>Cancel?</span>
                          <button
                            onClick={e => {
                              e.stopPropagation();
                              setConfirmingCancel(prev => { const n = new Set(prev); n.delete(p.id); return n; });
                              setCancelling(prev => ({ ...prev, [p.id]: true }));
                              onCancel(p.id).finally(() =>
                                setCancelling(prev => ({ ...prev, [p.id]: false }))
                              );
                            }}
                            style={{ fontSize: '0.72rem', padding: '1px 6px', borderRadius: 4,
                              background: 'var(--status-error)', color: '#fff', border: 'none', cursor: 'pointer' }}
                          >Yes</button>
                          <button
                            onClick={e => {
                              e.stopPropagation();
                              setConfirmingCancel(prev => { const n = new Set(prev); n.delete(p.id); return n; });
                            }}
                            style={{ fontSize: '0.72rem', padding: '1px 6px', borderRadius: 4,
                              background: 'var(--bg-card-hover)', color: 'var(--text-secondary)', border: 'none', cursor: 'pointer' }}
                          >No</button>
                        </div>
                      ) : (
                        <button
                          title="Cancel process"
                          disabled={!!cancelling[p.id]}
                          onClick={e => {
                            e.stopPropagation();
                            setConfirmingCancel(prev => new Set(prev).add(p.id));
                          }}
                          style={{
                            background: 'none', border: '1px solid var(--status-error)',
                            borderRadius: 4, color: 'var(--status-error)',
                            cursor: cancelling[p.id] ? 'not-allowed' : 'pointer',
                            fontSize: '0.7rem', padding: '1px 5px', flexShrink: 0,
                            opacity: cancelling[p.id] ? 0.5 : 1, lineHeight: 1.4,
                          }}
                        >
                          ⏹
                        </button>
                      )
                    )}
                    {isError && (
                      <button
                        title="Dismiss error"
                        onClick={e => { e.stopPropagation(); dismissError(p.id); }}
                        style={{
                          background: 'none', border: 'none', color: 'var(--text-dim)',
                          cursor: 'pointer', fontSize: '0.8rem', padding: '1px 4px',
                          flexShrink: 0, lineHeight: 1,
                        }}
                      >
                        ✕
                      </button>
                    )}
                  </div>

                  {/* Time info */}
                  <div style={{ paddingLeft: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontSize: '0.72rem', color: 'var(--text-dim)' }}>
                      {formatTime(p.started_at)}
                    </span>
                    {isRunning ? (
                      <span style={{ fontSize: '0.72rem', color: 'var(--accent)', fontVariantNumeric: 'tabular-nums' }}>
                        {elapsed(p.started_at)}
                      </span>
                    ) : (
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                        {countdown !== null && (
                          <span style={{ fontSize: '0.68rem', color: 'var(--text-dim)', fontVariantNumeric: 'tabular-nums' }}>
                            {countdown}s
                          </span>
                        )}
                        <span style={{
                          fontSize: '0.7rem', color: statusColor(p.status),
                          textTransform: 'uppercase', letterSpacing: '0.3px',
                        }}>
                          {p.status.replace('_', ' ')}
                        </span>
                      </div>
                    )}
                  </div>

                  {/* Error message */}
                  {isError && p.error_message && (
                    <div style={{
                      paddingLeft: 14, fontSize: '0.7rem', color: 'var(--status-error)',
                      overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                    }}>
                      {p.error_message}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [activeView, setActiveView] = useState('report');
  const [processes, setProcesses] = useState([]);
  const [icmStages, setIcmStages] = useState([]);
  const [ollamaStatus, setOllamaStatus] = useState('disconnected');
  const [claudeStatus, setClaudeStatus] = useState('not_configured');
  const [linearStatus, setLinearStatus] = useState('not_configured');
  const [report, setReport] = useState(null);
  const [reportLoading, setReportLoading] = useState(false);
  const [chatHistory, setChatHistory] = useState([]);
  const [chatLoading, setChatLoading] = useState(false);
  const [tokenStreams, setTokenStreams] = useState({});
  const [toasts, setToasts] = useState([]);
  const [wsConnected, setWsConnected] = useState(false);
  const [focusedAgentId, setFocusedAgentId] = useState(null);
  const wsRef = useRef(null);
  const reconnectDelay = useRef(1000);
  const toastId = useRef(0);

  const addToast = useCallback((message, type = 'info') => {
    const id = ++toastId.current;
    setToasts(prev => [...prev, { id, message, type }]);
    const timeout = type === 'error' ? 5000 : 3000;
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), timeout);
  }, []);

  // Initial data load
  useEffect(() => {
    loadStatus();
    loadReport();
    loadChatHistory();
  }, []);

  // Poll every 30s as fallback
  useEffect(() => {
    const id = setInterval(loadStatus, 30000);
    return () => clearInterval(id);
  }, []);

  async function loadStatus() {
    try {
      const data = await API.get('/api/status');
      setProcesses(data.processes || []);
      setIcmStages(data.icm_stages || []);
      setOllamaStatus(data.ollama_status);
      setClaudeStatus(data.claude_status);
      setLinearStatus(data.linear_status || 'not_configured');
    } catch {}
  }

  async function loadReport() {
    try {
      const data = await API.get('/api/reports/latest');
      setReport(data.report);
    } catch {}
  }

  async function loadChatHistory() {
    try {
      const data = await API.get('/api/chat/history');
      setChatHistory(data.messages || []);
    } catch {}
  }

  // WebSocket connection with exponential backoff
  const connectWS = useCallback(() => {
    if (wsRef.current && wsRef.current.readyState < 2) return;

    const ws = new WebSocket(`ws://${window.location.host}/ws/updates`);
    wsRef.current = ws;

    ws.onopen = () => {
      setWsConnected(true);
      reconnectDelay.current = 1000;
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        handleWSMessage(msg);
      } catch {}
    };

    ws.onclose = () => {
      setWsConnected(false);
      const delay = reconnectDelay.current;
      reconnectDelay.current = Math.min(delay * 2, 30000);
      setTimeout(connectWS, delay);
    };

    ws.onerror = () => ws.close();
  }, []);

  useEffect(() => {
    connectWS();
    return () => {
      if (wsRef.current) wsRef.current.close();
    };
  }, [connectWS]);

  function handleWSMessage(msg) {
    switch (msg.type) {
      case 'status_snapshot':
        if (msg.processes) setProcesses(msg.processes);
        if (msg.icm_stages) setIcmStages(msg.icm_stages);
        if (msg.ollama_status) setOllamaStatus(msg.ollama_status);
        if (msg.claude_status) setClaudeStatus(msg.claude_status);
        if (msg.linear_status) setLinearStatus(msg.linear_status);
        break;

      case 'process_update':
        setProcesses(prev => {
          const idx = prev.findIndex(p => p.id === msg.process_id);
          if (idx === -1) {
            return [...prev, {
              id: msg.process_id, name: msg.name || 'Process',
              status: msg.status, type: 'unknown',
              started_at: new Date().toISOString(),
            }];
          }
          const updated = [...prev];
          updated[idx] = { ...updated[idx], status: msg.status };
          return updated;
        });
        // Refresh stages on process update
        loadStatus();
        break;

      case 'token_stream':
        if (msg.stage) {
          setTokenStreams(prev => ({
            ...prev,
            [msg.stage]: (prev[msg.stage] || '') + (msg.token || ''),
          }));
        }
        break;

      case 'report_complete':
        loadReport();
        addToast('Daily report ready!', 'success');
        break;

      case 'error':
        addToast(msg.message || 'An error occurred', 'error');
        break;

      case 'ping':
        if (wsRef.current && wsRef.current.readyState === 1) {
          wsRef.current.send('ping');
        }
        break;
    }
  }

  async function runReport() {
    setReportLoading(true);
    try {
      await API.post('/api/agents/linear-report/run', {});
      addToast('Report generation started', 'info');
      await loadStatus();
    } catch (err) {
      addToast(`Failed to start report: ${err.message}`, 'error');
    } finally {
      setReportLoading(false);
    }
  }

  async function sendReportToDiscovery() {
    try {
      await API.post('/api/icm/promote/1', {
        selected_files: ['daily_report.md'],
        source: 'previous_stage',
      });
      addToast('Report sent to Discovery input', 'success');
      await loadStatus();
    } catch (err) {
      addToast(`Could not send to Discovery: ${err.message}`, 'error');
      throw err; // re-throw so ReportView can reset its sending state
    }
  }

  async function runStage(stageNumber) {
    try {
      await API.post(`/api/icm/run/${stageNumber}`, {});
      addToast(`Stage ${stageNumber} started`, 'info');
      setTokenStreams(prev => {
        const stageName = ['','intake','discovery','opportunity','prd','critique','stories'][stageNumber];
        return { ...prev, [stageName]: '' };
      });
      await loadStatus();
    } catch (err) {
      addToast(`Failed to start stage ${stageNumber}: ${err.message}`, 'error');
    }
  }

  async function retryStage(stageNumber) {
    try {
      await API.post(`/api/icm/stages/${stageNumber}/retry`, {});
      addToast(`Stage ${stageNumber} retrying`, 'info');
      setTokenStreams(prev => {
        const stageName = ['','intake','discovery','opportunity','prd','critique','stories'][stageNumber];
        return { ...prev, [stageName]: '' };
      });
      await loadStatus();
    } catch (err) {
      addToast(`Failed to retry stage ${stageNumber}: ${err.message}`, 'error');
    }
  }

  async function markStageDone(stageNumber) {
    try {
      await API.post(`/api/icm/stages/${stageNumber}/done`, {});
      await loadStatus();
      addToast('Stage marked as done', 'success');
    } catch (err) {
      addToast('Could not update stage status', 'error');
    }
  }

  async function clearChatHistory() {
    try {
      await API.delete('/api/chat/history');
      setChatHistory([]);
    } catch (err) {
      addToast(`Could not clear history: ${err.message}`, 'error');
    }
  }

  async function sendChat(message) {
    const now = new Date().toISOString();
    setChatLoading(true);
    setChatHistory(prev => [...prev, { role: 'user', content: message, id: Date.now(), created_at: now }]);
    try {
      const data = await API.post('/api/chat', { message });
      setChatHistory(prev => [...prev, {
        role: 'assistant',
        content: data.response,
        id: Date.now() + 1,
        created_at: new Date().toISOString(),
        action_triggered: data.action_triggered || null,
      }]);
      if (data.action_triggered) {
        await loadStatus();
      }
    } catch (err) {
      addToast(`Chat error: ${err.message}`, 'error');
      setChatHistory(prev => prev.slice(0, -1));
    } finally {
      setChatLoading(false);
    }
  }

  const mainContent = () => {
    switch (activeView) {
      case 'report':
        return <ReportView report={report} loading={reportLoading} onRunReport={runReport} onSendToDiscovery={sendReportToDiscovery} linearStatus={linearStatus} onNavigate={setActiveView} />;
      case 'icm':
        return <ICMView stages={icmStages} tokenStreams={tokenStreams} processes={processes} onRunStage={runStage} onRetryStage={retryStage} onMarkDone={markStageDone} addToast={addToast} onRefreshStages={loadStatus} />;
      case 'agents':
        return <AgentsView processes={processes} onRunReport={runReport} focusedAgentId={focusedAgentId} />;
      case 'settings':
        return <SettingsView ollamaStatus={ollamaStatus} claudeStatus={claudeStatus} linearStatus={linearStatus} />;
      default:
        return null;
    }
  };

  return (
    <>
      <TopBar processes={processes} />
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <Sidebar
          activeView={activeView}
          setView={setActiveView}
          ollamaStatus={ollamaStatus}
          claudeStatus={claudeStatus}
          linearStatus={linearStatus}
          wsConnected={wsConnected}
        />
        <main style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          <div style={{ flex: 1, overflow: 'hidden', display: 'flex' }}>
            <div style={{ flex: 1, overflow: 'hidden' }}>
              {mainContent()}
            </div>
            <ProcessPanel
              processes={processes}
              onNavigate={(agentId) => {
                setFocusedAgentId(null);
                setTimeout(() => {
                  setActiveView('agents');
                  setFocusedAgentId(agentId);
                }, 0);
              }}
              onCancel={async (processId) => {
                try {
                  await API.post(`/api/processes/${processId}/cancel`, {});
                  addToast('Process cancelled', 'info');
                  await loadStatus();
                } catch (err) {
                  addToast(`Could not cancel: ${err.message}`, 'error');
                }
              }}
            />
          </div>
        </main>
      </div>
      <ChatBar chatHistory={chatHistory} onSend={sendChat} loading={chatLoading} onNavigate={setActiveView} onClear={clearChatHistory} />
      <ToastContainer toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
